# adapterOS MLX development config
# Uses real MLX backend with a local 4-bit quantized model for Apple Silicon dev machines.

[server]
backend = "mlx"
production_mode = false

[mlx]
enabled = true
model_path = "/var/models/Llama-3.2-3B-Instruct-4bit"
# Quantization/precision is fixed by the model weights (int4/int8/fp16); no per-request overrides
max_memory_mb = 12000
circuit_breaker_timeout_secs = 300

[telemetry]
enabled = true
streaming = true

[security]
jwt_mode = "eddsa"
