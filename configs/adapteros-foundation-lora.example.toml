# Example config for training a repo-aware LoRA adapter
# Adjust paths/IDs for your environment.

[base]
model_id = "qwen2.5-7b"            # Target base model ID (must match worker)
tokenizer = "qwen2.5-7b"           # Tokenizer aligned with base

[data]
train_path = "training/datasets/adapteros_foundation/train.jsonl"
val_path   = "training/datasets/adapteros_foundation/val.jsonl"
prompt_style = "chat"              # Align with UI chat format
max_source_len = 2048
max_target_len = 512

[training]
epochs = 3
batch_size = 16
grad_accum = 2
learning_rate = 1e-4
lr_scheduler = "cosine"
warmup_steps = 200
weight_decay = 0.0
max_grad_norm = 1.0
seed = 42
fp16 = true

[lora]
rank = 32
alpha = 32
dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[logging]
eval_steps = 500
save_steps = 1000
report_to = ["tensorboard"]

[eval]
eval_path = "training/datasets/adapteros_foundation/eval_prompts.jsonl"
max_eval_samples = 200

