[server]
port = 8080
bind_address = "0.0.0.0"
workers = 8
enable_mmap_adapters = true
mmap_cache_size_mb = 512
enable_hot_swap = true
# Enable memory-mapped adapter loading for improved performance
enable_mmap_adapters = true
# Cache size for mmap adapters (increase for more adapters)
mmap_cache_size_mb = 2048
# Enable hot-swap for zero-downtime adapter updates
enable_hot_swap = true

[db]
url = "postgresql://adapteros:secure_password@postgres-primary:5432/adapteros_prod"
pool_size = 30
connection_timeout_secs = 10

[security]
require_pf_deny = true
jwt_secret_path = "/etc/adapteros/jwt.secret"
ed25519_keypair_path = "/etc/adapteros/signing.key"

[paths]
plan_dir = "/var/lib/adapteros/plans"
artifact_dir = "/var/lib/adapteros/artifacts"
adapters_root = "/var/lib/adapteros/adapters"
telemetry_output = "/var/log/adapteros/telemetry.jsonl"

[router]
k_sparse = 3
entropy_floor = 0.02
gate_quant = "q15"
tau = 1.0
sample_tokens_full = 128
warmup = false
algorithm = "weighted"

[memory]
min_headroom_pct = 15
max_adapters_per_tenant = 50
evict_order = ["ephemeral_ttl", "cold_lru", "warm_lru", "framework_priority"]

[eviction_policy]
ephemeral_ttl_hours = 24
cold_threshold_mins = 60
warm_threshold_mins = 15

[telemetry]
enabled = true
json_output = "/var/log/adapteros/telemetry.jsonl"
prometheus_port = 9090
bundle_max_events = 500000
bundle_max_bytes = 268435456

[rag]
embed_dim = 3584
index_type = "hnsw"
ef_construction = 200
ef_search = 100
m = 16

[federation]
mode = "cluster"
leader_election_enabled = true
heartbeat_interval_secs = 10
node_timeout_secs = 30

# Enable all 22 policy packs for production
[policies]
egress = true
determinism = true
router = true
evidence = true
refusal = true
numeric = true
rag = true
isolation = true
telemetry = true
retention = true
performance = true
memory = true
artifacts = true
secrets = true
build_release = true
compliance = true
incident = true
output = true
adapters = true
deterministic_io = true
drift = true
mplora = true

[egress]
# Zero network egress - Unix sockets only
allowed_protocols = []
unix_socket_only = true
pf_rules_path = "/etc/pf.anchors/adapteros"

[determinism]
enforce_hkdf_seeding = true
precompiled_kernels_only = true
epsilon_tolerance = 1e-6

[compliance]
cmmc_level = 3
itar_enabled = true
audit_retention_days = 2555  # 7 years
report_generation_enabled = true

[performance]
max_latency_p95_ms = 100
min_throughput_tps = 30
max_queue_depth = 1000
