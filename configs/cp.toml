# adapterOS Control Plane Configuration

[server]
# Use 18080 for development (UI expects this)
port = 18080
bind = "127.0.0.1"
production_mode = false

[general]
# Default determinism mode for inference when tenant/stack policies are implicit.
# In dev, prefer `besteffort` so inference can proceed even if the selected backend
# cannot attest bounded-tolerance determinism (e.g., CoreML on mixed compute units).
determinism_mode = "besteffort"

[db]
# Use explicit scheme so loader maps to database.url correctly
path = "sqlite://var/aos-cp.sqlite3"
storage_mode = "kv_primary"
# Raised from 20→50: SQLite WAL mode handles concurrent readers well;
# 50 avoids pool-exhaustion under multi-tenant load without stressing the file.
pool_size = 50
kv_path = "var/aos-kv.redb"
kv_tantivy_path = "var/aos-kv-index"

[auth]
# Session lifetime in seconds (12 hours)
session_lifetime = 43200

[security]
# Set to false for development mode (allows running without root/PF rules)
# MUST be true in production!
require_pf_deny = false
mtls_required = false
# SECURITY: leave empty here and set AOS_SECURITY_JWT_SECRET in your env.
# Generate with: openssl rand -base64 64
jwt_secret = "dev-secret-key-for-development-only-32-chars-min-at-least"
jwt_mode = "hmac"
dev_login_enabled = true
dev_bypass = false
allow_registration = true

[paths]
artifacts_root = "var/artifacts"
bundles_root = "var/bundles"
adapters_root = "var/adapters"
plan_dir = "plan"
datasets_root = "var/datasets"
documents_root = "var/documents"
# Optional: Path to synthesis model for training data generation
# synthesis_model_path = "var/models/synthesis_model"
# Path to training worker binary. If unset, resolves from sibling directory or target/.
# training_worker_bin = "target/debug/aos-training-worker"

[model.cache]
# Explicit budget required for worker model cache (MB)
max.mb = 16384

[worker.safety]
# Timeout configuration
inference_timeout_secs = 30
evidence_timeout_secs = 5
router_timeout_ms = 100
policy_timeout_ms = 50

# Circuit breaker configuration
circuit_breaker_threshold = 5
circuit_breaker_timeout_secs = 60

# Resource limits
# Raised from 10→20: allows more parallel inference on Apple Silicon unified memory;
# still well within typical M-series bandwidth.
max_concurrent_requests = 20
max_tokens_per_second = 40
max_memory_per_request_mb = 50
max_cpu_time_per_request_secs = 30
# Raised from 100→300: aligned with [rate_limits].requests_per_minute below.
max_requests_per_minute = 300

# Health monitoring
health_check_interval_secs = 30
max_response_time_secs = 60
max_memory_growth_mb = 100
max_cpu_time_secs = 300
max_consecutive_failures = 3

[circuit_breaker]
# Number of consecutive failures before circuit breaker opens (default: 5)
failure_threshold = 5
# Time in seconds to wait before attempting recovery (default: 60)
reset_timeout_secs = 60
# Maximum calls allowed in half-open state to test recovery (default: 3)
half_open_max_calls = 3
# Deadline in seconds for worker operations before timeout (default: 600 = 10 minutes)
worker_deadline_secs = 600
# Enable automatic fallback to stub mode when circuit is open (default: true)
enable_stub_fallback = true
# Health check interval in seconds when circuit is open (default: 30)
health_check_interval_secs = 30

[health.adapter]
# Drift above this threshold is at least degraded
drift_hard_threshold = 0.15
# For high-tier adapters, this threshold blocks promotion
high_tier_block_threshold = 0.10

# Deadlock detection
deadlock_check_interval_secs = 5
max_wait_time_secs = 30
max_lock_depth = 10
recovery_timeout_secs = 10

[rate_limits]
# Raised from 100→300: previous default throttled multi-tenant workloads too
# aggressively. 300 rpm per tenant is still conservative for a local API.
requests_per_minute = 300
# Raised from 20→60: burst bucket should be ~20% of rpm to absorb UI page loads.
burst_size = 60
# Raised from 50→150: inference is the hot path; 150 rpm avoids unnecessary 429s
# while the circuit breaker still protects the GPU from overload.
inference_per_minute = 150

[capacity_limits]
# Maximum concurrent training jobs (default: 5)
max_concurrent_training_jobs = 5

[metrics]
enabled = true
bearer_token = "CHANGE_ME_METRICS_TOKEN_32_CHARS_MIN"
include_histogram = true
histogram_buckets = [0.001, 0.005, 0.01, 0.05, 0.1, 0.5, 1.0, 5.0]

[alerting]
enabled = true
alert_dir = "var/alerts"
max_alerts_per_file = 10000
rotate_size_mb = 50

[self_hosting]
# off | on | safe (safe requires manual promotion)
mode = "off"
repo_allowlist = []
promotion_threshold = 0.0

[logging]
# Log level filter (supports per-module levels like "aos_cp=debug,tower_http=info")
level = "info"
# Directory for log files (comment out for stdout-only in dev)
log_dir = "var/logs"
# Log file prefix
log_prefix = "aos-cp"
# Enable JSON format for log aggregation tools (default: false for human-readable)
json_format = false
# Rotation: "hourly", "daily", or "never"
rotation = "daily"
# Maximum rotated log files to keep (0 = unlimited)
max_log_files = 30
# Include request IDs in log output
include_request_id = true
# Capture panics to log file
capture_panics = true

[coreml]
# CoreML backend configuration for Neural Engine (ANE) acceleration
# Compute units: cpu_only, cpu_and_gpu, cpu_and_ne, all
# - cpu_only: CPU only (slowest, most compatible)
# - cpu_and_gpu: CPU + GPU (good for most workloads)
# - cpu_and_ne: CPU + Neural Engine (best power efficiency)
# - all: All available compute units (default)
#
# NOTE: Strict determinism mode requires CoreML attestation to report a non-`none`
# determinism level. Keep production_mode=false for dev so the worker can boot
# (and fall back to mixed compute units) while still allowing inference.
compute_preference = "cpu_and_gpu"
production_mode = false

[uma_memory]
# UMA (Unified Memory Architecture) budget for Apple Silicon.
# Controls how much of the system's shared CPU/GPU memory pool the inference
# pipeline may consume. Prevents OOM when multiple adapters are loaded.
ceiling_pct = 75
headroom_pct = 15
eviction_notifications = true

[model_server]
# Model Server mode: Workers connect to shared Model Server instead of loading model locally
# This reduces GPU memory usage by ~65% (one model copy instead of N workers × model)
# Default: false (workers load models directly - legacy mode)
enabled = false
# gRPC server address for Model Server
server_addr = "http://127.0.0.1:18085"
# Maximum KV cache sessions (each session is a conversation context)
max_kv_cache_sessions = 32
# Hot adapter promotion threshold (adapters with >10% activation are cached in Model Server)
hot_adapter_threshold = 0.10
# KV cache memory limit in MB (0 = automatic based on available GPU memory)
kv_cache_limit_mb = 0
