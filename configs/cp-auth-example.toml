# public_key_file = "/etc/adapteros/jwt_public.pem"
#
# [security]
# require_https = true
# cors_origins = [
#     "https://app.adapteros.example.com",
#     "https://console.adapteros.example.com"
# ]
# enable_rate_limiting = true
#
# [security.rate_limiting]
# requests_per_minute = 60
# burst = 10
#
# [metrics]
# enabled = true
# bearer_token = "<generated-token-from-openssl-rand-hex-32>"
