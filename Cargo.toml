[workspace]
members = [
    "crates/adapteros-*"
]

resolver = "2"

[workspace.package]
version = "0.1.0"
authors = ["rogu3bear <vats-springs0m@icloud.com>"]
edition = "2021"  # Inherited by members for consistency
license = "MIT OR Apache-2.0"
repository = "https://github.com/rogu3bear/mplora"

[features]
default = ["deterministic-only"]
deterministic-only = []
experimental-backends = ["dep:pyo3"]
mlx-ffi-backend = ["adapteros-base-llm/mlx-ffi", "adapteros-lora-worker/mlx-ffi-backend"]
extended-tests = []
integration_tests = []

[dependencies]
tower_governor = "0.5"
# Re-export key crates for integration tests
adapteros-lora-kernel-api = { path = "crates/adapteros-lora-kernel-api" }
adapteros-lora-kernel-mtl = { path = "crates/adapteros-lora-kernel-mtl" }
pyo3 = { workspace = true, features = ["extension-module"], optional = true }
anyhow = "1.0"
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true

[workspace.dependencies]
aes-gcm = "0.10"
anyhow = "1.0"
bincode = "1.3"
blake3 = "1.5"
ed25519-dalek = "2.0"
ring = "0.16"
thiserror = "1.0"
serde = { version = "1.0" , features = ["derive"] }
serde_json = "1.0"
serde_jcs = "0.1"
schemars = "0.8"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
rusqlite = "0.31"
sqlx = { version = "0.8" , features = ["runtime-tokio-rustls" , "sqlite"] }
tracing = "0.1"
proptest = "1.4"
pyo3 = "0.22"
tokenizers = "0.19"
safetensors = "0.4"
memmap2 = "0.9"
