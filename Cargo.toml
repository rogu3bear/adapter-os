[workspace]
members = [
    "crates/adapteros-*"
]

resolver = "2"

[workspace.package]
version = "0.1.0"
authors = ["rogu3bear <vats-springs0m@icloud.com>"]
edition = "2021"  # Inherited by members for consistency
license = "MIT OR Apache-2.0"
repository = "https://github.com/rogu3bear/adapter-os"

[workspace.dependencies]
aes-gcm = "0.10"
anyhow = "1.0"
bincode = "1.3"
blake3 = "1.5"
ed25519-dalek = "2.0"
ring = "0.16"
thiserror = "1.0"
serde = { version = "1.0" , features = ["derive"] }
serde_json = "1.0"
serde_jcs = "0.1"
schemars = "0.8"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
rusqlite = "0.31"
sqlx = { version = "0.8" , features = ["runtime-tokio-rustls" , "sqlite"] }
tracing = "0.1"
proptest = "1.4"
pyo3 = "0.22"
tokenizers = "0.19"
safetensors = "0.4"
memmap2 = "0.9"
crossbeam = "0.8"
parking_lot = "0.12"
nix = "0.28"
tokio = { version = "1.0" , features = ["full"] }
walkdir = "2.5"
tempfile = "3.13"
futures = "0.3"
hex = "0.4"
uuid = { version = "1.10" , features = ["v4" , "serde"] }
chrono = { version = "0.4" , features = ["serde"] }
base64 = "0.22"
serde_cbor = "0.11"
clap = { version = "4.5" , features = ["derive"] }
axum = "0.7"
tower = "0.4"
tower-http = "0.5"
async-trait = "0.1"
rand_core = "0.6"
zeroize = "1.8"
cocoa = "0.25"
core-foundation = "0.9"
metal = "0.24"
objc = "0.2"
serde_derive = "1.0"
bytemuck = { version = "1.16" , features = ["derive"] }
prometheus = "0.13"
hyper = "1.0"
hyper-util = "0.1"
futures-util = "0.3"
sysinfo = "0.30"
tantivy = "0.22"
reqwest = { version = "0.12" , features = ["json"] }
tar = "0.4"
zstd = "0.13"
security-framework = { version = "2.11.1" , features = ["OSX_10_13"] }
argon2 = { version = "0.5" , features = ["std"] }
comfy-table = "7.2.1"
async-stream = "0.3"
hnsw_rs = "0.3.2"
smallvec = "1.13"
tracing-subscriber = { version = "0.3" , features = ["env-filter" , "json"] }
tokio-stream = "0.1"
refinery = "0.8"
hostname = "0.3"
