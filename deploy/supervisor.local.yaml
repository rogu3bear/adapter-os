# adapterOS Service Supervisor Configuration (Local Canonical Ports)
#
# This is a local-dev friendly variant that aligns with the canonical port roles:
# - Control plane HTTP: AOS_SERVER_PORT (default 8080)
# - Trunk UI dev server: AOS_UI_PORT (default 3200)
# - Supervisor panel: AOS_PANEL_PORT (default 3301)
# - Node agent: AOS_NODE_PORT (default 9443)
#
# Keep `deploy/supervisor.yaml` as its own mode; use this file when you want the
# supervisor stack to match the port contract in docs/PORTS.md.

server:
  host: "127.0.0.1"
  port: 3301
  workers: 4
  max_connections: 1000
  timeout_seconds: 30
  cors_allowed_origins:
    - "http://localhost:8080"
    - "http://localhost:3200"
    - "http://localhost:3301"

services:
  service-panel:
    name: "Service Panel"
    description: "Rust-based service supervisor API"
    command: "target/release/adapteros-service-supervisor"
    args: []
    environment: {}
    port: 3301
    category: "management"
    essential: true
    dependencies: []
    startup_order: 0
    resource_limits:
      max_memory_mb: null
      max_cpu_percent: null
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:3301/health"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "always"
      max_attempts: 5
      backoff_base_seconds: 1
      backoff_max_seconds: 300
      window_seconds: 300

  backend-server:
    name: "Backend Server"
    description: "adapterOS inference server"
    command: "cargo"
    args:
      - "run"
      - "-p"
      - "adapteros-server"
      - "--bin"
      - "adapteros-server"
      - "--"
      - "--config"
      - "configs/cp.toml"
      - "--skip-pf-check"
      - "--single-writer"
    working_directory: "/Users/star/Dev/adapter-os"
    environment:
      AOS_SERVER_PORT: "8080"
    port: 8080
    category: "core"
    essential: true
    dependencies: []
    startup_order: 1
    resource_limits:
      max_memory_mb: 4096
      max_cpu_percent: 80.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:8080/healthz"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "on_failure"
      max_attempts: 5
      backoff_base_seconds: 5
      backoff_max_seconds: 300
      window_seconds: 300

  ui-frontend:
    name: "UI Frontend"
    description: "Leptos WASM dashboard application (Trunk dev server)"
    command: "trunk"
    args: ["serve", "--address", "0.0.0.0", "--port", "3200"]
    working_directory: "crates/adapteros-ui"
    environment:
      AOS_SERVER_PORT: "8080"
      AOS_UI_PORT: "3200"
    port: 3200
    category: "core"
    essential: false
    dependencies: ["backend-server"]
    startup_order: 2
    resource_limits:
      max_memory_mb: 1024
      max_cpu_percent: 50.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:3200"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "on_failure"
      max_attempts: 3
      backoff_base_seconds: 10
      backoff_max_seconds: 120
      window_seconds: 300

  training-orchestrator:
    name: "Training Orchestrator"
    description: "Manages training job scheduling and execution"
    command: "cargo"
    args: ["run", "-p", "adapteros-orchestrator"]
    working_directory: "/Users/star/Dev/adapter-os"
    environment:
      RUST_LOG: "adapteros_orchestrator=info"
    port: 3302
    category: "core"
    essential: true
    dependencies: ["backend-server"]
    startup_order: 4
    resource_limits:
      max_memory_mb: 2048
      max_cpu_percent: 60.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:3302/health"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 10
    restart_policy:
      policy: "on_failure"
      max_attempts: 3
      backoff_base_seconds: 5
      backoff_max_seconds: 120
      window_seconds: 300

  metrics-collector:
    name: "Metrics Collector"
    description: "Collects system and application metrics"
    command: "cargo"
    args: ["run", "-p", "adapteros-metrics-collector"]
    working_directory: "/Users/star/Dev/adapter-os"
    environment:
      RUST_LOG: "adapteros_metrics_collector=info"
    port: 9090
    category: "monitoring"
    essential: false
    dependencies: []
    startup_order: 6
    resource_limits:
      max_memory_mb: 512
      max_cpu_percent: 20.0
    health_check:
      enabled: true
      check_type: "tcp"
      endpoint: "localhost:9090"
      interval_seconds: 30
      timeout_seconds: 5
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "always"
      max_attempts: 10
      backoff_base_seconds: 2
      backoff_max_seconds: 60
      window_seconds: 300

  adapteros-node:
    name: "adapterOS Node Agent"
    description: "Distributed node agent for federation"
    command: "cargo"
    args: ["run", "-p", "adapteros-node", "--", "--port", "9443"]
    working_directory: "/Users/star/Dev/adapter-os"
    environment:
      RUST_LOG: "adapteros_node=info"
      AOS_NODE_PORT: "9443"
    port: 9443
    category: "management"
    essential: false
    dependencies: ["backend-server"]
    startup_order: 8
    resource_limits:
      max_memory_mb: 1024
      max_cpu_percent: 40.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:9443/health"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 10
    restart_policy:
      policy: "on_failure"
      max_attempts: 3
      backoff_base_seconds: 5
      backoff_max_seconds: 120
      window_seconds: 300

monitoring:
  metrics_enabled: true
  health_check_interval_seconds: 30
  log_level: "info"
  prometheus_port: 9091

