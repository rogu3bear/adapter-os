# Serena project configuration for AdapterOS
# Optimized for Claude Code integration

# Languages for LSP support
# Rust is primary; TypeScript for codegraph-viewer and Playwright tests
languages:
- rust
- typescript

encoding: "utf-8"

# Use project's .gitignore
ignore_all_files_in_gitignore: true

# Additional paths to ignore (large/generated directories)
ignored_paths:
- "target/**"
- "target-codex/**"
- "var/**"
- "**/node_modules/**"
- "**/.git/**"
- "**/dist/**"
- "**/*.sqlite3"
- "**/*.sqlite3-*"
- "crates/adapteros-server/static/**"
- "crates/adapteros-server/static-minimal/**"
- "golden_runs/**"

read_only: false

# Exclude tools that duplicate Claude Code capabilities
# Claude Code has: Read, Write, Edit, Glob, Grep, Bash
# Keep Serena's semantic tools: find_symbol, get_symbols_overview, etc.
excluded_tools:
- read_file          # Use Claude's Read
- create_text_file   # Use Claude's Write
- list_dir           # Use Claude's Bash(ls) or Glob
- execute_shell_command  # Use Claude's Bash
- search_for_pattern # Use Claude's Grep

# Concise initial prompt - CLAUDE.md provides project context
initial_prompt: |
  ## Serena Integration Notes

  Use Serena's semantic tools for code understanding:
  - `find_symbol` - Locate functions/structs/traits by name
  - `get_symbols_overview` - Get file structure
  - `find_referencing_symbols` - Find all references
  - `replace_symbol_body` - Replace entire definitions
  - `rename_symbol` - Refactor names across codebase

  Use Claude Code tools for everything else (file I/O, shell, search).

  Key memories to read first: `project_overview`, `codebase_structure`

project_name: "adapter-os"

# Include useful optional tools
included_optional_tools:
- open_dashboard
- restart_language_server
- switch_modes

fixed_tools: []

# Modes optimized for Claude Code autonomous work
base_modes:

default_modes:
- one-shot
- editing
