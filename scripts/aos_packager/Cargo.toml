[package]
name = "aos-packager"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "aos-packager"
path = "src/main.rs"

[workspace]

[dependencies]
blake3 = "1.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ed25519-dalek = "2.1"
rand = "0.8"
chrono = "0.4"
anyhow = "1.0"
clap = { version = "4.0", features = ["derive"] }
hex = "0.4"
byteorder = "1.5"
safetensors = "0.4"
adapteros-core = { path = "../../crates/adapteros-core" }

# For tensor manipulation
ndarray = "0.15"
rand_distr = "0.4"

[dev-dependencies]
tempfile = "3.8"
serial_test = "3.1"