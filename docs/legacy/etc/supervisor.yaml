# adapterOS Service Supervisor Configuration

server:
  host: "127.0.0.1"
  port: 18082
  workers: 4
  max_connections: 1000
  timeout_seconds: 30
  cors_allowed_origins:
    - "http://localhost:18080"
    - "http://localhost:18081"

services:
  service-panel:
    name: "Service Panel"
    description: "Rust-based service supervisor API"
    command: "target/release/adapteros-service-supervisor"
    args: []
    environment: {}
    port: 18082
    category: "management"
    essential: true
    dependencies: []
    startup_order: 0
    resource_limits:
      max_memory_mb: null
      max_cpu_percent: null
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:18082/health"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "always"
      max_attempts: 5
      backoff_base_seconds: 1
      backoff_max_seconds: 300
      window_seconds: 300

  backend-server:
    name: "Backend Server"
    description: "adapterOS inference server"
    command: "cargo"
    args: ["run", "-p", "adapteros-server", "--bin", "adapteros-server", "--", "--config", "configs/cp.toml", "--skip-pf-check", "--single-writer"]
    working_directory: "."
    environment: {}
    port: 18080
    category: "core"
    essential: true
    dependencies: []
    startup_order: 1
    resource_limits:
      max_memory_mb: 4096
      max_cpu_percent: 80.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:18080/healthz"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "on_failure"
      max_attempts: 5
      backoff_base_seconds: 5
      backoff_max_seconds: 300
      window_seconds: 300

  ui-frontend:
    name: "UI Frontend"
    description: "Leptos WASM dashboard application"
    command: "trunk"
    args: ["serve", "--address", "0.0.0.0", "--port", "18081"]
    working_directory: "crates/adapteros-ui"
    environment: {}
    port: 18081
    category: "core"
    essential: false
    dependencies: []
    startup_order: 2
    resource_limits:
      max_memory_mb: 1024
      max_cpu_percent: 50.0
    health_check:
      enabled: true
      check_type: "http"
      endpoint: "http://localhost:18081"
      interval_seconds: 30
      timeout_seconds: 10
      max_failures: 3
      initial_delay_seconds: 5
    restart_policy:
      policy: "on_failure"
      max_attempts: 3
      backoff_base_seconds: 10
      backoff_max_seconds: 120
      window_seconds: 300

  supervisor:
    name: "Process Supervisor"
    description: "Legacy supervisor process (for compatibility)"
    command: "aos-supervisor"
    args: ["--config", "scripts/supervisor.toml"]
    working_directory: "."
    environment: {}
    category: "core"
    essential: false
    dependencies: ["backend-server"]
    startup_order: 3
    resource_limits:
      max_memory_mb: 512
      max_cpu_percent: 20.0
    health_check:
      enabled: true
      check_type: "process"
      interval_seconds: 60
      timeout_seconds: 5
      max_failures: 5
      initial_delay_seconds: 10
    restart_policy:
      policy: "never"
      max_attempts: 1
      backoff_base_seconds: 1
      backoff_max_seconds: 1
      window_seconds: 300

auth:
  token_ttl_hours: 8
  refresh_grace_period_minutes: 60
  max_login_attempts: 5
  lockout_duration_minutes: 15

monitoring:
  metrics_enabled: true
  health_check_interval_seconds: 30
  log_level: "info"
  prometheus_port: 18084
