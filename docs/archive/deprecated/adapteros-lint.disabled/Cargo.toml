[package]
name = "adapteros-lint"
version = "0.1.0"
edition = "2021"
description = "Custom lint rules for AdapterOS determinism enforcement"

[dependencies]
rustc_tools_util = "0.2"
clippy_utils = "0.1"
if_chain = "1.0"
syntax = "1.0"
rustc_ast = "1.0"
rustc_hir = "1.0"
rustc_middle = "1.0"
rustc_session = "1.0"
rustc_span = "1.0"
rustc_lint = "1.0"
rustc_errors = "1.0"
rustc_data_structures = "1.0"
rustc_index = "1.0"
rustc_metadata = "1.0"
rustc_typeck = "1.0"
rustc_trait_selection = "1.0"
rustc_infer = "1.0"
rustc_mir = "1.0"
rustc_apfloat = "1.0"
rustc_target = "1.0"
rustc_ast_pretty = "1.0"
rustc_attr = "1.0"
rustc_expand = "1.0"
rustc_lexer = "1.0"
rustc_parse = "1.0"
rustc_plugin = "1.0"
rustc_serialize = "1.0"
rustc_ast_lowering = "1.0"
rustc_resolve = "1.0"
rustc_type_ir = "1.0"
rustc_ty_utils = "1.0"
rustc_const_eval = "1.0"
rustc_borrowck = "1.0"
rustc_query_system = "1.0"
rustc_query_impl = "1.0"
rustc_interface = "1.0"
rustc_driver = "1.0"
rustc_codegen_ssa = "1.0"
rustc_codegen_llvm = "1.0"
rustc_llvm = "1.0"
rustc_fs_util = "1.0"
rustc_parse_format = "1.0"
rustc_privacy = "1.0"
rustc_save_analysis = "1.0"
rustc_symbol_mangling = "1.0"
rustc_ast_passes = "1.0"
rustc_passes = "1.0"
rustc_lint_defs = "1.0"
rustc_macros = "1.0"
rustc_ast_ir = "1.0"
rustc_ast_lint = "1.0"
rustc_hir_pretty = "1.0"
rustc_incremental = "1.0"
rustc_mir_build = "1.0"
rustc_mir_transform = "1.0"
rustc_monomorphize = "1.0"
rustc_transforms = "1.0"
rustc_utils = "1.0"
rustc_workspace_hack = "1.0"

[lib]
name = "adapteros_lint"
crate-type = ["dylib"]

[[bin]]
name = "adapteros-lint-driver"
path = "src/main.rs"
