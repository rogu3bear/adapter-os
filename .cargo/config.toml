# Cargo configuration for deterministic builds
# Per Determinism Ruleset #2: Reproducible builds across machines

[build]
# Disable debug info for smaller, reproducible binaries
# Note: macOS-specific link args moved to target-specific sections
rustflags = [
    "-Cdebuginfo=0",
]

# Target-specific configuration
[target.aarch64-apple-darwin]
rustflags = [
    "-Cdebuginfo=0",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-Cdebuginfo=0",
]

[target.wasm32-unknown-unknown]
# Minimal flags for WASM builds - no link-args that are macOS-specific
rustflags = []

[env]
# IMPORTANT: sccache and incremental compilation are mutually exclusive.
# sccache is opt-in via environment (e.g. RUSTC_WRAPPER=sccache)
# so CI and clean environments do not require sccache to be installed.
# Set to "0" to avoid "sccache: incremental compilation is prohibited" errors
# that break rust-analyzer and cargo metadata.
CARGO_INCREMENTAL = "0"
# Always show progress bar during builds
CARGO_TERM_PROGRESS_WHEN = "always"
CLANG_MODULE_CACHE_PATH = "target/clang-cache"
MODULE_CACHE_DIR = "target/clang-cache"
# SOURCE_DATE_EPOCH ensures timestamps are deterministic
SOURCE_DATE_EPOCH = "1704067200"

# ═══════════════════════════════════════════════════════════════════════════════
# Advanced Build Performance Optimizations
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. SCCACHE - OPTIONAL via environment
#    - Enable per shell/session: export RUSTC_WRAPPER=sccache
#    - Check stats: sccache --show-stats
#    - Clear cache: sccache --zero-stats
#
# 2. PARALLEL FRONTEND (Nightly Only)
#    - Parallelizes the Rust frontend across 8 threads
#    - Requires: rustup run nightly cargo build
#    - Add to [build] rustflags: "-Zthreads=8"
#
# 3. LINK-TIME OPTIMIZATION (Release Builds)
#    - Already configured in [profile.release] via Cargo.toml
#    - Use --profile release-dev for faster iteration with optimizations
#
# ═══════════════════════════════════════════════════════════════════════════════

[alias]
xtask = "run --package xtask --"
# Check cache staleness (warns if >48h or >50GB)
# Usage: cargo check-cache
check-cache = "xtask check-cache"

# ═══════════════════════════════════════════════════════════════════════════════
# Build & Test Visibility Aliases
# ═══════════════════════════════════════════════════════════════════════════════
# Timed builds - generates HTML report in target/cargo-timings/
tb = "build --workspace --timings"
tbr = "build --workspace --release --timings"
# Verbose build - shows each crate being compiled
bv = "build --workspace -v"
# Test with nextest (install: cargo install cargo-nextest)
nt = "nextest run --workspace"
ntf = "nextest run --workspace --failure-output=immediate"
# Server dual-mode local loop (fast vs full)
svr-fast-test = "test -p adapteros-core drain::tests::"
svr-fast-check = "check -p adapteros-server"
svr-full-test = "test -p adapteros-server --bin aos-server"
# Quick check (faster than build, just type checking)
c = "check --workspace"
# Clippy with error visibility lints (catches silent error swallowing)
cl = "clippy --workspace -- -W clippy::let_underscore_must_use"
