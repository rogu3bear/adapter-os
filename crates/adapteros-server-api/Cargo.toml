[package]
name = "adapteros-server-api"
version = "0.1.0"
edition = "2021"

[dependencies]
adapteros-core = { path = "../adapteros-core", features = ["sqlx"] }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-db = { path = "../adapteros-db", features = ["utoipa"] }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-codegraph = { path = "../adapteros-codegraph" }
adapteros-git = { path = "../adapteros-git" }
adapteros-manifest = { path = "../adapteros-manifest" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-lora-worker = { path = "../adapteros-lora-worker" }
adapteros-orchestrator = { path = "../adapteros-orchestrator" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-registry = { path = "../adapteros-registry" }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-system-metrics = { path = "../adapteros-system-metrics" }
adapteros-federation = { path = "../adapteros-federation" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
parking_lot = "0.12"
anyhow = "1.0"
argon2 = "0.5"
axum = { version = "0.8", features = ["macros", "multipart"] }
base64 = "0.21"
chrono = "0.4"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
git2 = "0.18"
hex = { workspace = true }
hyper = "1.0"
hyper-util = "0.1"
httpdate = "1.0"
jsonwebtoken = "9.2"
once_cell = "1.20"
rand = "0.8"
regex = "1.0"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
sysinfo = { workspace = true }
tempfile = "3.0"
thiserror = "1.0"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["codec"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["compression-br"] }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
uuid = { version = "1.0", features = ["v4", "v7"] }
futures-util = "0.3"
glob = "0.3"
walkdir = "2.4"
blake3 = { workspace = true }
prometheus = "0.13"
sha2 = "0.10"
url = "2"
safetensors = { workspace = true }
flate2 = "1.0"
tar = "0.4"
zip = "0.6"
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", optional = true }
hostname.workspace = true

[dev-dependencies]
criterion = { workspace = true }
async-trait = "0.1"

[lints.rust]
# Enforce handler return type standards
# Prevent tuple return types that cause Handler trait inference issues
unused = "warn"

[lints.clippy]
# Warn on large error types (encourages consistent error handling)
result_large_err = "warn"
# Other clippy lints can be added here as needed

[features]
default = []
mlx-ffi-backend = ["adapteros-lora-mlx-ffi"]
postgres = []
redis = []
metrics = []

[[bin]]
name = "export-openapi"
path = "src/bin/export-openapi.rs"
