[package]
name = "adapteros-server-api"
version = "0.1.0"
edition = "2021"

[features]
openapi = []
# Enable native MLX FFI runtime wiring for models
mlx-ffi-backend = ["adapteros-base-llm", "adapteros-lora-mlx-ffi"]
# Optional subsystems for CDP and Federation handlers
cdp = []
federation = []
# Optional features for operation tracker
metrics = []
redis = []

[dependencies]
adapteros-core = { path = "../adapteros-core", features = ["sqlx"] }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-db = { path = "../adapteros-db" }
adapteros-secure-fs = { path = "../adapteros-secure-fs" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-codegraph = { path = "../adapteros-codegraph" }
adapteros-git = { path = "../adapteros-git" }
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-aos = { path = "../adapteros-aos" }
adapteros-orchestrator = { path = "../adapteros-orchestrator" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-system-metrics = { path = "../adapteros-system-metrics" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-trace = { path = "../adapteros-trace" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-single-file-adapter = { path = "../adapteros-single-file-adapter" }
adapteros-base-llm = { path = "../adapteros-base-llm", optional = true }
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", optional = true }
anyhow = "1.0"
argon2 = "0.5"
async-trait = "0.1"
axum = { version = "0.7", features = ["macros", "multipart"] }
base64 = "0.21"
chrono = "0.4"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
git2 = "0.18"
hex = "0.4"
hyper = "1.0"
md5 = "0.7"
hyper-util = "0.1"
once_cell = "1.0"
jsonwebtoken = "9.2"
rand = "0.8"
regex = "1.0"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
sysinfo = "0.30"
tempfile = "3.0"
thiserror = "1.0"
tracing = "0.1"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["io"] }
tower = "0.5"
tower-http = { version = "0.5", features = ["trace", "cors", "limit"] }
utoipa = { version = "4.2", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "6.0", features = ["axum"] }
url = "2.0"
uuid = { version = "1.0", features = ["v7"] }
futures-util = "0.3"
glob = "0.3"
walkdir = "2.4"
blake3 = { workspace = true }

[dev-dependencies]
axum-test = "15.0"
