[package]
name = "adapteros-server-api"
version = "0.4.0"
edition = "2021"

[lib]
doctest = false
[dependencies]
adapteros-client = { path = "../adapteros-client" }
adapteros-core = { path = "../adapteros-core", features = ["sqlx"] }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-db = { path = "../adapteros-db", features = ["utoipa"] }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-aos = { path = "../adapteros-aos" }
adapteros-codegraph = { path = "../adapteros-codegraph" }
adapteros-boot = { path = "../adapteros-boot" }
adapteros-retrieval = { path = "../adapteros-retrieval" }
adapteros-git = { path = "../adapteros-git" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-lora-worker = { path = "../adapteros-lora-worker" }
adapteros-model-hub = { path = "../adapteros-model-hub" }
adapteros-orchestrator = { path = "../adapteros-orchestrator" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-storage = { path = "../adapteros-storage" }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-system-metrics = { path = "../adapteros-system-metrics" }
adapteros-federation = { path = "../adapteros-federation" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-types = { path = "../adapteros-types" }
dashmap = "5.5"
parking_lot = "0.12"
lru = "0.16"
scopeguard = "1.2"
anyhow = "1.0"
argon2 = "0.5"
axum = { version = "0.8", features = ["macros", "multipart"] }
dotenvy = "0.15"
base64 = "0.22"
bcrypt = "0.15"
bytes = "1.6"
chrono = "0.4"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
git2 = "0.18"
hex = { workspace = true }
http-body = "1.0"
http-body-util = "0.1"
hyper = "1.0"
hyper-util = "0.1"
httpdate = "1.0"
jsonwebtoken = { workspace = true }
once_cell = "1.20"
rand = { workspace = true }
regex = "1.0"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sqlx = { workspace = true, default-features = false, features = ["sqlite", "runtime-tokio"] }
sysinfo = { workspace = true }
tempfile = "3.0"
thiserror = "2.0"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["codec"] }  # sync module available by default
tower = { workspace = true }
tower-http = { workspace = true, features = ["compression-br"] }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
uuid = { version = "1.0", features = ["v4", "v7"] }
futures-util = "0.3"
glob = "0.3"
walkdir = "2.4"
blake3 = { workspace = true }
data-encoding = "2.5"
prometheus = { workspace = true }
# OpenTelemetry distributed tracing
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
tracing-opentelemetry = { workspace = true }
sha2 = "0.10"
subtle = "2.5"  # Constant-time comparison utilities for timing-safe operations
url = "2"
unicode-normalization = "0.1"
urlencoding = "2"
safetensors = { workspace = true }
flate2 = "1.0"
tar = "0.4"
zstd = { workspace = true }
serde_jcs = { workspace = true }
zip = "0.6"
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", optional = true, features = ["mlx"] }
adapteros-config = { path = "../adapteros-config" }
adapteros-ingest-docs = { path = "../adapteros-ingest-docs", optional = true }
hostname.workspace = true
tokenizers = { workspace = true }
async-trait = "0.1"
hmac = "0.12"
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"], optional = true }
sha1 = "0.10"
hkdf = { workspace = true }
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["signal"] }
[dev-dependencies]
criterion = { workspace = true }
futures = "0.3"
axum-test = { version = "16" }
adapteros-auth = { path = "../adapteros-auth" }
adapteros-lora-kernel-coreml = { path = "../adapteros-lora-kernel-coreml" }
adapteros-diagnostics = { path = "../adapteros-diagnostics" }
insta = { version = "1.41.0", features = ["json"] }
[lints.rust]
# Enforce handler return type standards
# Prevent tuple return types that cause Handler trait inference issues
unused = "warn"
[lints.clippy]
# Warn on large error types (encourages consistent error handling)
result_large_err = "warn"
# Other clippy lints can be added here as needed
[features]
default = []
# MLX backend support - enables MLX capability detection and reporting
mlx-ffi-backend = ["adapteros-lora-mlx-ffi"]
# Standalone MLX flag for capability gating
mlx = []
coreml-backend = ["adapteros-lora-worker/coreml-backend", "adapteros-orchestrator/coreml-backend"]
embeddings = ["adapteros-ingest-docs/multi-backend"]
redis = ["dep:redis"]
metrics = []
dev-bypass = []
[[bin]]
name = "export-openapi"
path = "src/bin/export-openapi.rs"
