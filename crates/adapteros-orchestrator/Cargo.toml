[package]
name = "adapteros-orchestrator"
version.workspace = true
edition = "2021"
authors = ["James KC Auchterlonie <vats-springs0m@icloud.com>"]
license = "MIT OR Apache-2.0"

[features]
default = []
deterministic-only = []
coreml-backend = ["adapteros-lora-worker/coreml-backend"]
mlx-synthesis = ["dep:adapteros-lora-mlx-ffi"]

[dependencies]
# Core
anyhow.workspace = true
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_yaml = "0.9"
# CLI
clap = { workspace = true, features = ["derive"] }
# Internal crates
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-config = { path = "../adapteros-config" }
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-artifacts = { path = "../adapteros-artifacts" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-model-hub = { path = "../adapteros-model-hub" }
adapteros-types = { path = "../adapteros-types" }
adapteros-db = { path = "../adapteros-db" }
adapteros-federation = { path = "../adapteros-federation" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-retrieval = { path = "../adapteros-retrieval" }
bincode = "1.3"
adapteros-lora-worker = { path = "../adapteros-lora-worker", default-features = false }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-ingest-docs = { path = "../adapteros-ingest-docs" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-client = { path = "../adapteros-client" }
adapteros-storage = { path = "../adapteros-storage" }
blake3 = { workspace = true }
tokenizers = { workspace = true }
git2 = "0.20"
# Database
sqlx = { workspace = true }
# Async
tokio = { workspace = true, features = ["full"] }
async-trait = "0.1"
futures-util = { workspace = true }
# Logging
tracing = { workspace = true }
# Filesystem
walkdir.workspace = true
# Utilities
hex.workspace = true
base64 = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
chrono = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
tempfile = { workspace = true }
regex = "1.10"
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", optional = true }

[dev-dependencies]
nix.workspace = true

[[bin]]
name = "aos-orchestrator"
path = "src/main.rs"
