[package]
name = "adapteros-orchestrator"
version = "0.1.0"
edition = "2021"
authors = ["James KC Auchterlonie <vats-springs0m@icloud.com>"]
license = "MIT OR Apache-2.0"

[dependencies]
# Core
anyhow.workspace = true
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_yaml = "0.9"

# CLI
clap = { workspace = true, features = ["derive"] }

# Internal crates
adapteros-config = { path = "../adapteros-config" }
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-sbom = { path = "../adapteros-sbom" }
adapteros-manifest = { path = "../adapteros-manifest" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-types = { path = "../adapteros-types" }
adapteros-db = { path = "../adapteros-db" }
adapteros-federation = { path = "../adapteros-federation" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-registry = { path = "../adapteros-registry" }
adapteros-codegraph = { path = "../adapteros-codegraph" }
bincode = "1.3"
adapteros-lora-worker = { path = "../adapteros-lora-worker" }
adapteros-ingest-docs = { path = "../adapteros-ingest-docs" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-platform = { path = "../adapteros-platform" }
blake3 = { workspace = true }
tokenizers = { workspace = true }
git2 = "0.18"

# Database
sqlx = { workspace = true }

# Async
tokio = { workspace = true, features = ["full"] }
async-trait = "0.1"

# Logging
tracing = { workspace = true }

# Filesystem
walkdir.workspace = true

# Utilities
hex.workspace = true
uuid = { workspace = true, features = ["v4"] }
chrono = { workspace = true }
parking_lot = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "adapteros-orchestrator"
path = "src/main.rs"
