[package]
name = "adapteros-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "aosctl"
path = "src/main.rs"

[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-manifest = { path = "../adapteros-manifest" }
adapteros-registry = { path = "../adapteros-registry" }
adapteros-artifacts = { path = "../adapteros-artifacts" }
adapteros-sbom = { path = "../adapteros-sbom" }
adapteros-lora-plan = { path = "../adapteros-lora-plan" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-db = { path = "../adapteros-db" }
adapteros-client = { path = "../adapteros-client" }
adapteros-server = { path = "../adapteros-server" }
adapteros-api = { path = "../adapteros-api" }
adapteros-lora-worker = { path = "../adapteros-lora-worker" }
adapteros-lora-rag = { path = "../adapteros-lora-rag" }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-ingest-docs = { path = "../adapteros-ingest-docs" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-lora-kernel-mtl = { path = "../adapteros-lora-kernel-mtl" }
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi" }
adapteros-secd = { path = "../adapteros-secd" }
adapteros-system-metrics = { path = "../adapteros-system-metrics" }
adapteros-replay = { path = "../adapteros-replay" }
adapteros-trace = { path = "../adapteros-trace" }
adapteros-verify = { path = "../adapteros-verify", features = ["clap"] }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
# adapteros-codegraph = { path = "../adapteros-codegraph" }  # Temporarily disabled due to SQLite conflict
pyo3 = { workspace = true, features = ["auto-initialize"] }
clap = { workspace = true }
clap_complete = "4.4"
clap_mangen = "0.2"
dialoguer = "0.11"
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
comfy-table = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { workspace = true }
nix = { workspace = true }
owo-colors = "4.0"
serde_yaml = "0.9"
tempfile = "3.8"
walkdir = "2.4"
chrono = "0.4"
hex = "0.4"
zip = "1.0"
fs_extra = "1.3"
sysinfo = "0.30"
sqlx = { workspace = true }
blake3 = "1.5"
hyper-util = "0.1"
tower = "0.4"
once_cell = "1.19"
uuid = { version = "1.6", features = ["v4", "serde"] }

[features]
experimental-backends = []
