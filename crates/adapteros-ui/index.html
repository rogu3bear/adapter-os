    <!-- PRD-UI-000: Pre-hydration theme to prevent FOUC -->
    <script>
        (function() {
            try {
                var raw = localStorage.getItem('adapteros_settings');
                if (!raw) return;
                var settings = JSON.parse(raw);
                var theme = settings && settings.theme;
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else if (theme === 'light') {
                    document.documentElement.classList.add('light');
                } else {
                    // system or missing — check OS preference
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.add('light');
                    }
                }
            } catch(e) {
                // Silently fail — WASM will apply theme later
            }
        })();
    </script>

    <meta name="aos-build-time" content="__BUILD_TIME__">

    <style>

            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;

            font-family: var(--boot-font-mono, ui-monospace, monospace);

        #aos-panic-overlay {

    <!-- PRD-UI-000: Pre-hydration glass to prevent FOUC -->

    <script>
        // PRD-UI-000: WASM fetch interceptor for download progress tracking
        (function () {
            var originalFetch = window.fetch;
            window.fetch = function (url, options) {
                var urlStr = typeof url === 'string' ? url : (url.url || '');

                // Only intercept WASM file fetches
                if (!urlStr.endsWith('.wasm')) {
                    return originalFetch.apply(this, arguments);
                }

                if (window.aosWasmFetchStart) window.aosWasmFetchStart(0);

                return originalFetch.apply(this, arguments).then(function (response) {
                    if (!response.ok) return response;

                    var contentLength = response.headers.get('content-length');
                    var total = contentLength ? parseInt(contentLength, 10) : 0;
                    var loaded = 0;

                    if (window.aosWasmFetchStart) window.aosWasmFetchStart(total);

                    var reader = response.body.getReader();
                    var chunks = [];

                    function read() {
                        return reader.read().then(function (result) {
                            if (result.done) {
                                if (window.aosWasmFetchDone) window.aosWasmFetchDone(loaded);
                                var blob = new Blob(chunks);
                                return new Response(blob, {
                                    headers: response.headers,
                                    status: response.status,
                                    statusText: response.statusText
                                });
                            }

                            chunks.push(result.value);
                            loaded += result.value.length;
                            if (window.aosWasmFetchProgress) window.aosWasmFetchProgress(loaded, total);
                            return read();
                        });
                    }

                    return read();
                });
            };
        })();
    </script>
    <script>
        // PRD-UI-000: WebAssembly instantiation interceptor for error capture
        (function () {
            var originalInstantiate = WebAssembly.instantiate;
            var originalInstantiateStreaming = WebAssembly.instantiateStreaming;

            WebAssembly.instantiate = function (bufferSource, importObject) {
                return originalInstantiate.apply(this, arguments).catch(function (error) {
                    if (window.aosWasmInstantiateError) {
                        window.aosWasmInstantiateError(error, 'instantiate');
                    }
                    throw error;
                });
            };

            if (originalInstantiateStreaming) {
                WebAssembly.instantiateStreaming = function (source, importObject) {
                    return originalInstantiateStreaming.apply(this, arguments).catch(function (error) {
                        if (window.aosWasmInstantiateError) {
                            window.aosWasmInstantiateError(error, 'instantiateStreaming');
                        }
                        throw error;
                    });
                };
            }
        })();
    </script>
    <script>
        // PRD-UI-000: Enhanced boot diagnostics with streaming progress
        (function () {
            // Read build metadata from meta tags
            var buildHashMeta = document.querySelector('meta[name="aos-build-hash"]');
            var buildTimeMeta = document.querySelector('meta[name="aos-build-time"]');
            var buildHash = buildHashMeta ? buildHashMeta.content : 'dev';
            var buildTime = buildTimeMeta ? buildTimeMeta.content : new Date().toISOString();

            window.aosBoot = {
                startTime: Date.now(),
                buildHash: buildHash,
                buildTime: buildTime,
                errors: [],
                stages: {
                    html: { status: 'done', time: 0 },
                    css: { status: 'pending', time: null },
                    wasmFetch: { status: 'pending', time: null, bytes: 0, total: 0 },
                    wasmCompile: { status: 'pending', time: null },
                    runtime: { status: 'pending', time: null },
                    mount: { status: 'pending', time: null },
                    backend: { status: 'pending', time: null }
                }
            };

            // Format bytes as human readable
            function formatBytes(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            }

            // Format elapsed time
            function getElapsed() {
                return ((Date.now() - window.aosBoot.startTime) / 1000).toFixed(1) + 's';
            }

            // Update elapsed time display
            var elapsedInterval = setInterval(function () {
                var el = document.getElementById('boot-elapsed');
                if (el) el.textContent = getElapsed();
            }, 100);

            // Update stage UI
            function updateStage(stageId, status, detail) {
                var stage = document.getElementById('stage-' + stageId);
                if (!stage) return;

                stage.dataset.status = status;
                var icon = stage.querySelector('.icon');
                var detailEl = stage.querySelector('.detail');

                if (status === 'done') {
                    icon.textContent = '✓';
                    window.aosBoot.stages[stageId.replace('-', '')] = { status: 'done', time: Date.now() - window.aosBoot.startTime };
                } else if (status === 'active') {
                    icon.textContent = '●';
                } else if (status === 'error') {
                    icon.textContent = '✗';
                }

                if (detail !== undefined && detailEl) {
                    detailEl.textContent = detail;
                }
            }

            // Hide boot progress and show app
            function hideBoot() {
                clearInterval(elapsedInterval);
                var progress = document.getElementById('aos-boot-progress');
                var probe = document.getElementById('aos-boot-probe');
                if (progress) progress.classList.add('hidden');
                if (probe) {
                    probe.textContent = 'Boot: ' + getElapsed();
                    setTimeout(function () { probe.classList.add('hidden'); }, 3000);
                }
            }

            // Track CSS loading
            var cssSheets = document.querySelectorAll('link[rel="stylesheet"]');
            var cssLoaded = 0;
            var cssTotal = cssSheets.length;

            function checkCss() {
                updateStage('css', 'active', cssLoaded + '/' + cssTotal);
                if (cssLoaded >= cssTotal) {
                    updateStage('css', 'done', cssTotal + ' loaded');
                }
            }

            cssSheets.forEach(function (link) {
                if (link.sheet) {
                    cssLoaded++;
                } else {
                    link.addEventListener('load', function () {
                        cssLoaded++;
                        checkCss();
                    });
                    link.addEventListener('error', function () {
                        cssLoaded++;
                        checkCss();
                    });
                }
            });
            checkCss();

            // PRD-UI-000: Compile timeout (if no signal after 30s, something's wrong)
            var compileTimeoutId = null;
            var compileStarted = false;

            function startCompileTimeout() {
                if (compileStarted) return;
                compileStarted = true;
                compileTimeoutId = setTimeout(function () {
                    if (window.aosBoot.stages.wasmCompile.status !== 'done') {
                        updateStage('wasm-compile', 'error', 'timeout (30s)');
                        showBootError('WASM compilation timed out after 30 seconds. This may indicate a browser issue or corrupted WASM binary.');
                    }
                }, 30000);
            }

            function clearCompileTimeout() {
                if (compileTimeoutId) {
                    clearTimeout(compileTimeoutId);
                    compileTimeoutId = null;
                }
            }

            // PRD-UI-000: Show error in boot progress using safe DOM methods
            function showBootError(message) {
                clearInterval(elapsedInterval);
                var probe = document.getElementById('aos-boot-probe');
                var progress = document.getElementById('aos-boot-progress');

                if (probe) {
                    probe.textContent = 'ERROR';
                    probe.classList.add('error');
                }

                // Add error message to boot progress using safe DOM construction
                if (progress && !progress.querySelector('.boot-error')) {
                    var errorDiv = document.createElement('div');
                    errorDiv.className = 'boot-error';

                    var titleStrong = document.createElement('strong');
                    titleStrong.textContent = 'Boot Error:';
                    errorDiv.appendChild(titleStrong);
                    errorDiv.appendChild(document.createElement('br'));
                    errorDiv.appendChild(document.createTextNode(message));

                    var actionsDiv = document.createElement('div');
                    actionsDiv.className = 'boot-actions';

                    var reloadBtn = document.createElement('button');
                    reloadBtn.textContent = 'Reload';
                    reloadBtn.className = 'boot-action-btn';
                    reloadBtn.onclick = function () { location.reload(); };

                    var safeBtn = document.createElement('button');
                    safeBtn.textContent = 'Safe Mode';
                    safeBtn.className = 'boot-action-btn secondary';
                    safeBtn.onclick = function () { location.href = '/safe'; };

                    actionsDiv.appendChild(reloadBtn);
                    actionsDiv.appendChild(safeBtn);
                    errorDiv.appendChild(actionsDiv);

                    progress.appendChild(errorDiv);
                }
            }

            // PRD-UI-000: Parse WASM-specific error messages
            function parseWasmError(error) {
                var msg = error.message || String(error);

                // LinkError: usually indicates missing imports
                if (msg.includes('LinkError') || msg.includes('import')) {
                    return 'WASM link failed: Missing JavaScript import. The WASM binary may be incompatible with this browser version.';
                }
                // CompileError: WASM bytecode issues
                if (msg.includes('CompileError') || msg.includes('compile')) {
                    return 'WASM compile failed: Invalid bytecode. Try clearing browser cache (Cmd+Shift+R).';
                }
                // Memory issues
                if (msg.includes('memory') || msg.includes('Memory') || msg.includes('OOM')) {
                    return 'WASM memory error: Not enough memory to instantiate. Try closing other tabs.';
                }
                // Network/fetch issues
                if (msg.includes('NetworkError') || msg.includes('fetch')) {
                    return 'WASM fetch failed: Could not download the application. Check network connection.';
                }
                // MIME type issues
                if (msg.includes('MIME') || msg.includes('mime')) {
                    return 'WASM MIME error: Server not configured correctly. Expected application/wasm.';
                }
                return msg;
            }

            function redactSensitiveInfo(raw) {
                var text = String(raw || '');
                text = text.replace(/Bearer\s+[A-Za-z0-9\-_.]+/gi, 'Bearer [REDACTED]');
                text = text.replace(/eyJ[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+/g, '[REDACTED_JWT]');
                text = text.replace(/(jwt|auth_token|password|api_key|secret|access_token|refresh_token)\s*=\s*[^\s&]+/gi, '$1=[REDACTED]');
                text = text.replace(/Authorization:\s*[^\r\n]+/gi, 'Authorization: [REDACTED]');
                return text;
            }

            function getCookieValue(name) {
                var cookieStr = document.cookie || '';
                var cookies = cookieStr.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    var prefix = name + '=';
                    if (cookie.indexOf(prefix) === 0) {
                        return decodeURIComponent(cookie.substring(prefix.length));
                    }
                }
                return null;
            }

            function shouldReportBootClientError() {
                return !!window.aosBoot &&
                    !!window.aosBoot.stages &&
                    window.aosBoot.stages.mount &&
                    window.aosBoot.stages.mount.status !== 'done';
            }

            function sanitizeDetails(details) {
                if (!details) return null;
                try {
                    return JSON.parse(JSON.stringify(details, function (_key, value) {
                        if (typeof value === 'string') {
                            return redactSensitiveInfo(value).slice(0, 1500);
                        }
                        return value;
                    }));
                } catch (_err) {
                    return { note: 'details_unavailable' };
                }
            }

            function reportBootClientError(errorType, message, details, code) {
                if (!shouldReportBootClientError()) return;

                try {
                    var payload = {
                        error_type: errorType,
                        message: redactSensitiveInfo(message).slice(0, 1900),
                        code: code || null,
                        failure_code: null,
                        http_status: null,
                        page: window.location.pathname || '/',
                        user_agent: (navigator && navigator.userAgent) ? navigator.userAgent : 'Unknown',
                        timestamp: new Date().toISOString(),
                        details: sanitizeDetails(details)
                    };

                    var headers = { 'Content-Type': 'application/json' };
                    var csrf = getCookieValue('csrf_token');
                    if (csrf) {
                        headers['X-CSRF-Token'] = csrf;
                    }

                    fetch('/v1/telemetry/client-errors/anonymous', {
                        method: 'POST',
                        credentials: 'same-origin',
                        keepalive: true,
                        headers: headers,
                        body: JSON.stringify(payload)
                    }).catch(function () { });
                } catch (_err) {
                    // Best-effort telemetry only.
                }
            }

            // Error handlers
            window.addEventListener('error', function (e) {
                var message = e.message || 'Unknown error';
                window.aosBoot.errors.push(message);
                var probe = document.getElementById('aos-boot-probe');
                if (probe) { probe.textContent = 'ERROR: ' + message; probe.classList.add('error'); }

                // If we haven't mounted yet, this is likely a boot error
                if (window.aosBoot.stages.mount.status !== 'done') {
                    reportBootClientError(
                        'JsBootError',
                        message,
                        {
                            source: 'window.error',
                            filename: e.filename || null,
                            lineno: e.lineno || null,
                            colno: e.colno || null
                        },
                        'JS_BOOT_ERROR'
                    );
                    showBootError(message || 'Unknown JavaScript error during boot');
                }
            });

            window.addEventListener('unhandledrejection', function (e) {
                var rawMsg = e.reason ? (e.reason.message || String(e.reason)) : 'Promise rejected';
                var msg = parseWasmError(e.reason || {});
                window.aosBoot.errors.push(rawMsg);

                var probe = document.getElementById('aos-boot-probe');
                if (probe) { probe.textContent = 'WASM ERROR'; probe.classList.add('error'); }

                // Determine which stage failed
                if (window.aosBoot.stages.wasmFetch.status === 'active' || window.aosBoot.stages.wasmFetch.status === 'pending') {
                    updateStage('wasm-fetch', 'error', 'failed');
                } else if (window.aosBoot.stages.wasmCompile.status === 'active') {
                    updateStage('wasm-compile', 'error', 'failed');
                } else if (window.aosBoot.stages.runtime.status === 'active') {
                    updateStage('runtime', 'error', 'failed');
                }

                reportBootClientError(
                    'JsBootError',
                    rawMsg,
                    {
                        source: 'window.unhandledrejection',
                        parsed_message: msg
                    },
                    'JS_BOOT_UNHANDLED_REJECTION'
                );
                showBootError(msg);
            });

            // PRD-UI-000: Direct WASM instantiation error handler
            window.aosWasmInstantiateError = function (error, method) {
                var msg = parseWasmError(error);
                var rawWasmError = 'WASM ' + method + ': ' + (error.message || String(error));
                window.aosBoot.errors.push(rawWasmError);

                updateStage('wasm-compile', 'error', method + ' failed');
                reportBootClientError(
                    'JsBootError',
                    rawWasmError,
                    {
                        source: 'window.aosWasmInstantiateError',
                        method: method,
                        stack: error && error.stack ? String(error.stack) : null
                    },
                    'WASM_INSTANTIATE_ERROR'
                );
                showBootError(msg);

                // Log detailed error for debugging
                console.error('[adapterOS] WASM instantiation failed:', {
                    method: method,
                    error: error,
                    name: error.name,
                    message: error.message,
                    stack: error.stack
                });
            };

            // WASM fetch started (called by trunk's loader or our hook)
            window.aosWasmFetchStart = function (totalBytes) {
                updateStage('wasm-fetch', 'active', '0%');
                window.aosBoot.stages.wasmFetch.total = totalBytes || 0;
            };

            // WASM fetch progress
            window.aosWasmFetchProgress = function (loadedBytes, totalBytes) {
                var total = totalBytes || window.aosBoot.stages.wasmFetch.total;
                window.aosBoot.stages.wasmFetch.bytes = loadedBytes;
                if (total > 0) {
                    var pct = Math.round((loadedBytes / total) * 100);
                    updateStage('wasm-fetch', 'active', formatBytes(loadedBytes) + ' / ' + formatBytes(total) + ' (' + pct + '%)');
                } else {
                    updateStage('wasm-fetch', 'active', formatBytes(loadedBytes));
                }
            };

            // WASM fetch complete
            window.aosWasmFetchDone = function (totalBytes) {
                updateStage('wasm-fetch', 'done', formatBytes(totalBytes || window.aosBoot.stages.wasmFetch.bytes));
                updateStage('wasm-compile', 'active', 'compiling...');
                // Start timeout for compilation phase
                startCompileTimeout();
            };

            // WASM compile complete (called when wasm_bindgen init completes but before start)
            window.aosWasmCompileDone = function () {
                clearCompileTimeout();
                updateStage('wasm-compile', 'done', '');
            };

            // WASM loaded - runtime is initializing (called from Rust)
            window.aosSignalWasmLoaded = function () {
                clearCompileTimeout();
                updateStage('wasm-compile', 'done', '');
                updateStage('runtime', 'done', '');
                updateStage('mount', 'active', 'mounting...');
                var probe = document.getElementById('aos-boot-probe');
                if (probe && !probe.classList.contains('error')) {
                    probe.textContent = 'WASM: OK | Mounting...';
                }
            };

            // App mounted (called from Rust)
            window.aosSignalMounted = function () {
                updateStage('mount', 'done', '');

                // Hide boot progress immediately - app is ready to render
                // Backend health check can happen in background
                hideBoot();

                // Check backend health with 10-second timeout (non-blocking)
                updateStage('backend', 'active', 'checking...');
                var controller = new AbortController();
                var timeoutId = setTimeout(function () {
                    controller.abort();
                }, 10000);

                fetch('/healthz', { method: 'GET', signal: controller.signal })
                    .then(function (r) {
                        clearTimeout(timeoutId);
                        if (r.ok) {
                            updateStage('backend', 'done', 'connected');
                        } else {
                            updateStage('backend', 'error', 'status ' + r.status);
                        }
                    })
                    .catch(function (e) {
                        clearTimeout(timeoutId);
                        if (e.name === 'AbortError') {
                            updateStage('backend', 'error', 'timeout');
                        } else {
                            updateStage('backend', 'error', 'offline');
                        }
                    });
            };

            // Panic handler - creates overlay dynamically to prevent false positives
            window.aosShowPanic = function (message, stackTrace) {
                clearInterval(elapsedInterval);
                var progress = document.getElementById('aos-boot-progress');
                if (progress) progress.classList.add('hidden');

                // Remove any existing overlay before creating a new one
                var existing = document.getElementById('aos-panic-overlay');
                if (existing) existing.remove();

                // Build the overlay using safe DOM construction (no innerHTML)
                var overlay = document.createElement('div');
                overlay.id = 'aos-panic-overlay';
                overlay.classList.add('visible');

                var h1 = document.createElement('h1');
                h1.textContent = 'adapterOS UI Panic';
                overlay.appendChild(h1);

                var meta = document.createElement('div');
                meta.className = 'panic-meta';

                var routeDiv = document.createElement('div');
                var routeSpan = document.createElement('span');
                routeSpan.textContent = 'Route:';
                var routeStrong = document.createElement('strong');
                routeStrong.textContent = window.location.pathname || '/';
                routeDiv.appendChild(routeSpan);
                routeDiv.appendChild(document.createTextNode(' '));
                routeDiv.appendChild(routeStrong);
                meta.appendChild(routeDiv);

                var buildDiv = document.createElement('div');
                var buildSpan = document.createElement('span');
                buildSpan.textContent = 'Build:';
                var buildStrong = document.createElement('strong');
                buildStrong.textContent = buildHash.substring(0, 8);
                buildDiv.appendChild(buildSpan);
                buildDiv.appendChild(document.createTextNode(' '));
                buildDiv.appendChild(buildStrong);
                meta.appendChild(buildDiv);

                var timeDiv = document.createElement('div');
                var timeSpan = document.createElement('span');
                timeSpan.textContent = 'Time:';
                var timeStrong = document.createElement('strong');
                timeStrong.textContent = new Date().toISOString();
                timeDiv.appendChild(timeSpan);
                timeDiv.appendChild(document.createTextNode(' '));
                timeDiv.appendChild(timeStrong);
                meta.appendChild(timeDiv);

                overlay.appendChild(meta);

                var desc = document.createElement('p');
                desc.textContent = 'The UI encountered a fatal error:';
                overlay.appendChild(desc);

                var msgPre = document.createElement('pre');
                msgPre.id = 'aos-panic-message';
                msgPre.textContent = message || 'Unknown error';
                overlay.appendChild(msgPre);

                var details = document.createElement('details');
                var summary = document.createElement('summary');
                summary.textContent = 'Stack Trace';
                details.appendChild(summary);
                var stackPre = document.createElement('pre');
                stackPre.id = 'aos-panic-stack';
                stackPre.textContent = stackTrace || 'No stack trace available';
                details.appendChild(stackPre);
                overlay.appendChild(details);

                var actions = document.createElement('div');
                actions.className = 'panic-actions';

                var reloadBtn = document.createElement('button');
                reloadBtn.textContent = 'Reload Page';
                reloadBtn.onclick = function () { location.reload(); };
                actions.appendChild(reloadBtn);

                var safeBtn = document.createElement('button');
                safeBtn.className = 'secondary';
                safeBtn.textContent = 'Safe Mode';
                safeBtn.onclick = function () { location.href = '/safe'; };
                actions.appendChild(safeBtn);

                var dismissBtn = document.createElement('button');
                dismissBtn.className = 'secondary';
                dismissBtn.textContent = 'Dismiss';
                dismissBtn.onclick = function () { overlay.classList.remove('visible'); };
                actions.appendChild(dismissBtn);

                overlay.appendChild(actions);
                document.body.appendChild(overlay);

                var probe = document.getElementById('aos-boot-probe');
                if (probe) { probe.textContent = 'PANIC'; probe.classList.add('error'); }
            };

            // Clear panic overlay on navigation (fixes persistent panic dialog)
            window.addEventListener('popstate', function() {
                var overlay = document.getElementById('aos-panic-overlay');
                if (overlay) {
                    overlay.classList.remove('visible');
                }
            });

            // Expose build info for diagnostics
            window.aosGetBuildInfo = function () {
                return {
                    hash: buildHash,
                    time: buildTime,
                    route: window.location.pathname || '/',
                    elapsed: getElapsed(),
                    stages: window.aosBoot.stages,
                    errors: window.aosBoot.errors
                };
            };

            // Start WASM fetch tracking - hook into trunk's auto-generated loader
            // Trunk generates JS that fetches the WASM, we'll start with estimates
            updateStage('wasm-fetch', 'active', 'starting...');
        })();
    </script>
    <script>
        // PRD-UI-170: Register service worker for WASM and asset caching
        // Improves subsequent page loads significantly
        (function () {
            if ('serviceWorker' in navigator) {
                // Wait until after app is mounted to register SW
                // This prioritizes initial render over SW registration
                var originalMounted = window.aosSignalMounted;
                window.aosSignalMounted = function () {
                    originalMounted.apply(this, arguments);

                    // Register service worker after a delay to not compete with initial render
                    setTimeout(function () {
                        navigator.serviceWorker.register('/sw.js', { scope: '/' })
                            .then(function (registration) {
                                console.log('[adapterOS] Service worker registered:', registration.scope);

                                // Check for updates periodically
                                setInterval(function () {
                                    registration.update();
                                }, 60000); // Check every minute
                            })
                            .catch(function (error) {
                                // SW registration is optional - don't fail boot
                                console.log('[adapterOS] Service worker registration skipped:', error.message);
                            });
                    }, 2000); // 2 second delay after mount
                };
            }
        })();
    </script>
    <!-- PRD-UI-000: Load WASM after boot hooks are installed.
         This avoids a race where Rust calls window.aosSignalMounted before it's defined,
         leaving the boot progress overlay stuck on screen in fast/cached loads. -->
    <link data-trunk rel="rust" data-wasm-opt="0">
</body>
