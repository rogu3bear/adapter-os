# Trunk configuration for building the Leptos WASM app

[build]
# Output directory - build directly to server's static folder
dist = "../adapteros-server/static"
# Public URL base
public_url = "/"
# wasm-opt disabled in Trunk - handled by CI post-build step
# Trunk 0.21 doesn't support --enable-bulk-memory flag required for Rust 1.70+
# See: .github/workflows/ci.yml (leptos-wasm-build job)
# PRD-UI-170: CI runs wasm-opt -O4 --enable-bulk-memory, asserts <3.5MB
no_wasm_opt = true

# PRD-UI-170: Copy service worker to output directory
[[hooks]]
stage = "post_build"
command = "cp"
command_arguments = ["dist/sw.js", "../adapteros-server/static/sw.js"]

[watch]
# Watch for changes (stylers generates CSS at cargo build time)
watch = ["src", "index.html", "dist/base.css", "dist/glass.css", "dist/components.css", "dist/components", "dist/sw.js"]
# Ignore patterns
ignore = ["target"]

[serve]
# Development server port
port = 3200
# Proxy API requests to backend
proxy = [
    { path = "/api", address = "http://localhost:8080" },
    { path = "/v1", address = "http://localhost:8080" },
    { path = "/healthz", address = "http://localhost:8080" },
    { path = "/readyz", address = "http://localhost:8080" },
]
