# Trunk configuration for building the Leptos WASM app

[build]
# Output directory - build directly to server's static folder
dist = "../adapteros-server/static"
# Public URL base
public_url = "/"

# WASM optimization configuration
# Re-enabled with bulk-memory support for modern Rust WASM output
# Expected size reduction: 20-30% (3.8MB → ~2.5-3.0MB)
[tools.wasm_opt]
# Enable bulk-memory feature required by Rust 1.70+ WASM output
# -O4: aggressive optimization for both size and speed
# --enable-bulk-memory: required for modern Rust WASM
args = ["-O4", "--enable-bulk-memory"]

[watch]
# Watch for changes (stylers generates CSS at cargo build time)
watch = ["src", "index.html", "dist/base.css"]
# Ignore patterns
ignore = ["target"]

[serve]
# Development server port
port = 3200
# Proxy API requests to backend
proxy = [
    { path = "/api", address = "http://localhost:8080" },
    { path = "/v1", address = "http://localhost:8080" },
    { path = "/healthz", address = "http://localhost:8080" },
    { path = "/readyz", address = "http://localhost:8080" },
]
