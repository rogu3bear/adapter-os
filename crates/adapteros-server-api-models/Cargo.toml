[package]
name = "adapteros-server-api-models"
version = "0.0.1"
edition = "2021"

[lib]
doctest = false

[dependencies]
# Hub crate for shared types (spoke pattern)
adapteros-server-api = { path = "../adapteros-server-api" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-config = { path = "../adapteros-config" }
adapteros-core = { path = "../adapteros-core" }
adapteros-db = { path = "../adapteros-db" }
adapteros-lora-worker = { path = "../adapteros-lora-worker" }
adapteros-storage = { path = "../adapteros-storage" }

# Axum for handlers
axum = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# OpenAPI documentation
utoipa = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }

# Time handling
chrono = { workspace = true }
