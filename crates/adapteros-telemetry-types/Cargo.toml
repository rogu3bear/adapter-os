[package]
name = "adapteros-telemetry-types"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared telemetry metric types for adapterOS"

[features]
default = ["server"]
# Server feature enables adapteros-core dependency
server = ["dep:adapteros-core"]
# OpenAPI schema generation
utoipa = ["dep:utoipa", "adapteros-core/utoipa"]
# WASM-compatible build
wasm = ["adapteros-types/wasm"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
adapteros-core = { path = "../adapteros-core", optional = true }
adapteros-types = { path = "../adapteros-types", default-features = false }

[dependencies.utoipa]
version = "5.4"
features = ["axum_extras"]
optional = true
