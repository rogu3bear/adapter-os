[package]
name = "adapteros-lora-kernel-coreml"
version = "0.1.0"
edition = "2021"
authors = ["James KC Auchterlonie <vats-springs0m@icloud.com>"]
description = "CoreML backend for AdapterOS with ANE acceleration"
license = "MIT"

[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
cc = "1.0"

[dev-dependencies]
proptest = "1.0"
criterion = { version = "0.5", features = ["html_reports"] }
rand = "0.8"
rand_chacha = "0.3"
tokio = { version = "1.0", features = ["full"] }
tempfile = "3.0"

[features]
default = []
experimental = []
power-metrics = []  # Enable power consumption measurements

[[bench]]
name = "coreml_inference"
harness = false

[[bench]]
name = "ane_comparison"
harness = false

[lib]
name = "adapteros_lora_kernel_coreml"
path = "src/lib.rs"
