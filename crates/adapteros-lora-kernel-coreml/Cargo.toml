[package]
name = "adapteros-lora-kernel-coreml"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CoreML backend for AdapterOS - Neural Engine acceleration"

[features]
default = []
ane-optimizations = []

[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
thiserror = { workspace = true }
serde = { workspace = true }
serde_derive = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
hex = { workspace = true }
safetensors = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc = { workspace = true }
cocoa = { workspace = true }
core-foundation = { workspace = true }

[build-dependencies]
cc = "1.0"
blake3 = "1.5"

[dev-dependencies]
adapteros-memory = { path = "../adapteros-memory" }
