[package]
name = "adapteros-server-api-types"
version = "0.0.2"
edition = "2021"
description = "Shared types for adapteros-server-api crates"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rogu3bear/adapter-os"

[lib]
doctest = false

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"

# Web framework (for response types)
axum = { version = "0.8", features = ["macros"] }
http = "1.0"

# Common types
uuid = { version = "1.0", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
serde_json = "1.0"
