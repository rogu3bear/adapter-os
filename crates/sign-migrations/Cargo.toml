[package]
name = "sign-migrations"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "sign-migrations"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
blake3 = "1.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
rand = "0.8"
chrono = "0.4"
