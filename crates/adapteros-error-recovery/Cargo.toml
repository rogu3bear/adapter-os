[package]
name = "adapteros-error-recovery"
version.workspace = true
edition = "2021"
authors = ["adapterOS Team"]
description = "Error recovery and corruption detection for adapterOS"
license = "MIT OR Apache-2.0"

[dependencies]
adapteros-core = { path = "../adapteros-core" }
tokio = { version = "1.0", features = ["fs", "time", "sync", "macros", "rt", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tracing = { workspace = true }
tempfile = "3.8"
[dev-dependencies]
tokio-test = "0.4"
