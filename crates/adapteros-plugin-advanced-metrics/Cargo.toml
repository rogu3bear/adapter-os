[package]
name = "adapteros-plugin-advanced-metrics"
version.workspace = true
edition = "2021"

[dependencies]
adapteros-core = { path = "../adapteros-core" }
prometheus = "0.13"
async-trait = "0.1"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
chrono = "0.4"
