[package]
name = "adapteros-mlx"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "AdapterOS MLX abstraction layer using mlx-rs (experimental fallback path)"

# =============================================================================
# MLX-RS ABSTRACTION LAYER (EXPERIMENTAL FALLBACK)
# =============================================================================
# This crate wraps mlx-rs for the experimental pure-Rust MLX path.
# The primary/production backend is C++ FFI (adapteros-lora-mlx-ffi with `mlx` feature).
#
# This crate is ONLY used when `mlx-rs-backend` feature is enabled, which is
# deprecated and unsupported in production. Use C++ FFI for production workloads.
#
# Requires: Apple Silicon (M1/M2/M3/M4)
# =============================================================================

[features]
default = []
# Enable CoreML ANE acceleration for deterministic Neural Engine operations
# Only available on macOS with Apple Silicon
coreml-ane = ["dep:adapteros-lora-kernel-coreml"]

[dependencies]
# Internal
adapteros-core = { path = "../adapteros-core" }

# MLX - Real inference, always enabled
mlx-rs = "0.25"

# Common
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio.workspace = true

# CoreML ANE acceleration (macOS only, optional)
[target.'cfg(target_os = "macos")'.dependencies]
adapteros-lora-kernel-coreml = { path = "../adapteros-lora-kernel-coreml", optional = true }
