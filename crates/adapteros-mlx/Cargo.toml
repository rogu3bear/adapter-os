[package]
name = "adapteros-mlx"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "AdapterOS MLX abstraction layer using mlx-rs (DEPRECATED - not used in production)"

# =============================================================================
# MLX-RS ABSTRACTION LAYER (DEPRECATED)
# =============================================================================
# This crate wrapped mlx-rs for an experimental pure-Rust MLX path.
# The mlx-rs-backend feature has been removed. This crate is no longer used.
# The primary/production backend is C++ FFI (adapteros-lora-mlx-ffi with `mlx` feature).
#
# TODO: Consider removing this crate entirely in a future cleanup.
# =============================================================================

[features]
default = []
# Enable CoreML ANE acceleration for deterministic Neural Engine operations
# Only available on macOS with Apple Silicon
coreml-ane = ["dep:adapteros-lora-kernel-coreml"]

[dependencies]
# Internal
adapteros-core = { path = "../adapteros-core" }

# MLX - Real inference, always enabled
mlx-rs = "0.25"

# Common
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio.workspace = true

# CoreML ANE acceleration (macOS only, optional)
[target.'cfg(target_os = "macos")'.dependencies]
adapteros-lora-kernel-coreml = { path = "../adapteros-lora-kernel-coreml", optional = true }
