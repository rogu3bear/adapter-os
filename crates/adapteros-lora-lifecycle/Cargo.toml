[package]
name = "adapteros-lora-lifecycle"
version.workspace = true
edition = "2021"

[features]
default = []
# multi-backend: Enable MLX FFI backend for research/training workloads
multi-backend = []
coreml-backend = []

[dependencies]
adapteros-aos = { path = "../adapteros-aos" }
adapteros-core = { path = "../adapteros-core" }
adapteros-db = { path = "../adapteros-db" }
adapteros-single-file-adapter = { path = "../adapteros-single-file-adapter" }
adapteros-manifest = { path = "../adapteros-manifest" }
adapteros-model-hub = { path = "../adapteros-model-hub" }
adapteros-profiler = { path = "../adapteros-profiler" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-lora-kernel-mtl = { path = "../adapteros-lora-kernel-mtl" }
adapteros-memory = { path = "../adapteros-memory" }
adapteros-types = { path = "../adapteros-types" }
memmap2 = "0.9"
parking_lot = "0.12"
safetensors = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { workspace = true, default-features = false, features = ["runtime-tokio", "sqlite"] }
tokio = { version = "1", features = ["rt", "macros", "sync"] }
tracing = { workspace = true }
chrono = { workspace = true }
futures = "0.3"
zeroize = "1.8"
utoipa = "5.4"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
criterion = { workspace = true }
