[package]
name = "adapteros-lora-mlx-ffi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Workspace dependencies
adapteros-core = { path = "../adapteros-core" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
safetensors.workspace = true

# FFI bindings
libc = "0.2"
core-foundation = "0.9"

# Utilities
tracing.workspace = true
parking_lot.workspace = true
rand.workspace = true
zeroize = { version = "1.7", features = ["derive"] }
tokenizers.workspace = true
memmap2.workspace = true

# Async runtime and streaming
tokio.workspace = true
futures-util.workspace = true
uuid.workspace = true

[build-dependencies]
bindgen = "0.69"
cc = "1.0"

[dev-dependencies]
tempfile.workspace = true
tokio.workspace = true

[features]
default = []
real-mlx = []
test-utils = []

[lints.rust]
non_camel_case_types = "allow"
non_snake_case = "allow"
non_upper_case_globals = "allow"

# Disable tests that need API refactoring
[[test]]
name = "backend_integration_tests"
test = false

[[test]]
name = "deterministic_seeding_tests"
test = false

[[test]]
name = "model_loading_tests"
test = false

[[test]]
name = "resilience_integration_test"
test = false

[[test]]
name = "error_handling_tests"
test = false

[[test]]
name = "memory_tracking_tests"
test = false

[[test]]
name = "array_operations_tests"
test = false

[[test]]
name = "lora_operations_tests"
test = false

[[test]]
name = "mlx_seed_test"
test = false

