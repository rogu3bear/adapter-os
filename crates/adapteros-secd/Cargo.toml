[package]
name = "adapteros-secd"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "aos-secd"
path = "src/main.rs"
[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-db = { path = "../adapteros-db" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-boot = { path = "../adapteros-boot" }
blake3 = { workspace = true }
tokio = { workspace = true, features = ["full"] }
security-framework = { version = "2.11", optional = true }
core-foundation = { version = "0.9", optional = true }
ed25519-dalek = "2.1"
chacha20poly1305 = "0.10"
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
base64 = "0.22"
hex = { workspace = true }
clap = { workspace = true, features = ["derive"] }
nix = { workspace = true }
hkdf = { workspace = true }
sha2 = { workspace = true }
[features]
default = []
# Enable macOS Secure Enclave support (requires macOS 10.12+)
secure-enclave = ["security-framework", "core-foundation"]
