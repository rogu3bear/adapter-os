[package]
name = "adapteros-codegraph"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
test = false

[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-single-file-adapter = { path = "../adapteros-single-file-adapter" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-python = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-go = "0.20"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
tokio = { workspace = true, features = ["fs"] }
walkdir = { workspace = true }
bincode = { workspace = true }
blake3 = "1.8"
clap = { version = "4.0", features = ["derive"] }
env_logger = "0.10"
regex = "1.10"
toml = "0.8"
git2 = "0.18"

[[bin]]
name = "codegraph"
path = "src/bin/codegraph.rs"

[[test]]
name = "multi_language"
path = "tests/multi_language.rs"
required-features = ["extended-tests"]

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = "0.4"
env_logger = "0.10"
