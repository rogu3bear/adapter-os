[package]
name = "adapteros-service-supervisor"
version.workspace = true
edition = "2021"
description = "Production-ready service supervisor for adapterOS with proper process management and security"
authors = ["adapterOS Team"]

[dependencies]
# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-util = "0.7"
# HTTP server
axum = { workspace = true, features = ["json", "macros"] }
tower = { workspace = true, features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { workspace = true, features = ["auth"] }
reqwest = { version = "0.12", features = ["json"] }
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Configuration
config = "0.15"
# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
# Authentication
jsonwebtoken = { workspace = true }
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-core = { path = "../adapteros-core" }
adapteros-config = { path = "../adapteros-config" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
blake3 = { workspace = true }
hex = "0.4"
# Process management
signal-hook = "0.3"
nix = { version = "0.29", features = ["process", "signal"] }
# Error handling
thiserror = "2.0"
# Utilities
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
futures-util = { workspace = true }
async-trait = "0.1"
base64 = "0.22"
# Circuit breaker (temporarily removed)
# circuit_breaker = "0.1"
# Metrics
metrics = "0.23"
metrics-exporter-prometheus = "0.18"
[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }
