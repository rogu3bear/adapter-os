[package]
name = "adapteros-service-supervisor"
version.workspace = true
edition = "2021"
description = "Production-ready service supervisor for AdapterOS with proper process management and security"
authors = ["AdapterOS Team"]

[dependencies]
# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-util = "0.7"

# HTTP server
axum = { workspace = true, features = ["json", "macros"] }
tower = { workspace = true, features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { workspace = true, features = ["auth"] }
reqwest = { version = "0.12", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Configuration
config = "0.14"
serde_yaml = "0.9"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Authentication
jsonwebtoken = "9.2"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-core = { path = "../adapteros-core" }
adapteros-config = { path = "../adapteros-config" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
blake3 = { workspace = true }
hex = "0.4"

# Process management
sysinfo = "0.30"
signal-hook = "0.3"
nix = { version = "0.29", features = ["process", "signal"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Utilities
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
async-trait = "0.1"
base64 = "0.22"

# Circuit breaker (temporarily removed)
# circuit_breaker = "0.1"

# Metrics
metrics = "0.23"
metrics-exporter-prometheus = "0.15"

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }
