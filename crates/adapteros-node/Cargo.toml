[package]
name = "adapteros-node"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "aos-node"
path = "src/main.rs"

[dependencies]
# Internal crates
adapteros-core = { path = "../adapteros-core" }
adapteros-id = { path = "../adapteros-id" }
adapteros-lora-worker = { path = "../adapteros-lora-worker", default-features = false }
adapteros-artifacts = { path = "../adapteros-artifacts" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
# Workspace dependencies
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
hyper.workspace = true
nix.workspace = true
# Additional
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rustls = "0.23"
tokio-rustls = "0.26"
clap.workspace = true
rand = { workspace = true }
uuid.workspace = true
hostname.workspace = true
blake3 = { workspace = true }
hex = { workspace = true }
ed25519-dalek = { workspace = true }
[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "process", "io-util"] }
tracing-test = "0.2"
