[package]
name = "adapteros-uds-protocol"
version = "0.1.0"
edition = "2021"
description = "Shared UDS protocol types for AdapterOS control plane ↔ worker communication"

[features]
default = ["server"]
# Server feature enables utoipa for OpenAPI schema generation
server = ["dep:utoipa", "dep:adapteros-core"]

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Optional server dependencies
utoipa = { version = "5.4", features = ["axum_extras"], optional = true }
adapteros-core = { path = "../adapteros-core", optional = true }

# Shared types
adapteros-api-types = { path = "../adapteros-api-types", default-features = false }
adapteros-types = { path = "../adapteros-types", default-features = false }

[dev-dependencies]
insta = { version = "1.39", features = ["json"] }
schemars = "0.8"
