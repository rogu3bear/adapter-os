[package]
name = "adapteros-lora-rag"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
adapteros-retrieval = { path = "../adapteros-retrieval", default-features = false }

[features]
default = ["fts5"]
# Compatibility flags: keep feature names stable for downstream crates.
fts5 = ["adapteros-retrieval/fts5"]
hnsw = ["adapteros-retrieval/hnsw"]

[dev-dependencies]
tempfile = { workspace = true }
