[package]
name = "adapteros-single-file-adapter"
version.workspace = true
edition = "2021"
authors = ["James KC Auchterlonie <vats-springs0m@icloud.com>"]
license = "MIT OR Apache-2.0"
description = "Single-file adapter format (.aos) implementation for adapterOS"
repository = "https://github.com/rogu3bear/mplora"

[dependencies]
adapteros-aos = { path = "../adapteros-aos" }
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-types = { path = "../adapteros-types" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
tokio = { version = "1.0", features = ["fs"] }
tracing = "0.1"
hex = { workspace = true }
safetensors = { workspace = true }
half = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = "0.4"
tokio = { version = "1.0", features = ["test-util", "macros"] }
