[package]
name = "adapteros-patch"
version = "0.1.0"
edition = "2021"
description = "Deterministic, policy-compliant code patching with cryptographic verification"

[dependencies]
# Core dependencies
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-db = { path = "../adapteros-db" }
adapteros-telemetry = { path = "../adapteros-telemetry" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full", "fs"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Cryptography
blake3 = "1.0"
ed25519-dalek = "2.0"

# Database - Use same version as rest of project
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "postgres", "macros", "migrate", "chrono", "uuid"] }

# Utilities
uuid = { version = "1.6", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3.0"

[features]
default = ["sqlite"]
sqlite = ["sqlx/sqlite"]
postgres = ["sqlx/postgres"]
