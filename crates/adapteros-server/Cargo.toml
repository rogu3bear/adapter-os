[package]
name = "adapteros-server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "aos-server"
path = "src/main.rs"

[features]
default = ["embeddings", "multi-backend", "coreml-backend"]
# Multi-backend feature flag
# Enables MLX FFI backend through adapteros-lora-worker
# For research/training workloads with MLX support
# Also propagates to server-api for capability reporting
multi-backend = ["adapteros-lora-worker/multi-backend", "adapteros-server-api/mlx-ffi-backend"]
# MLX feature (enables multi-backend + worker mlx for capability detection)
mlx = ["multi-backend", "adapteros-lora-worker/mlx"]
dev-bypass = ["adapteros-server-api/dev-bypass"]
# Embedding model support for RAG
# Loads sentence-transformer models at startup for real embeddings
embeddings = ["adapteros-server-api/embeddings", "dep:adapteros-ingest-docs"]
# Model Server mode: workers connect to shared Model Server for inference
# Enables boot phase that verifies Model Server readiness before accepting requests
model-server = ["adapteros-lora-worker/model-server"]
# CoreML + ANE backend (propagates to server-api → worker → kernel)
coreml-backend = ["adapteros-server-api/coreml-backend"]
[dependencies]
# Internal crates
adapteros-boot = { path = "../adapteros-boot" }
adapteros-config = { path = "../adapteros-config" }
adapteros-core = { path = "../adapteros-core" }
adapteros-types = { path = "../adapteros-types" }
adapteros-server-api = { path = "../adapteros-server-api", features = ["exclude-spoke-routes"] }
adapteros-server-api-audit = { path = "../adapteros-server-api-audit" }
adapteros-server-api-health = { path = "../adapteros-server-api-health" }
adapteros-db = { path = "../adapteros-db" }
adapteros-git = { path = "../adapteros-git" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-artifacts = { path = "../adapteros-artifacts" }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-lora-worker = { path = "../adapteros-lora-worker", default-features = false }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-federation = { path = "../adapteros-federation" }
adapteros-orchestrator = { path = "../adapteros-orchestrator" }
adapteros-model-hub = { path = "../adapteros-model-hub" }
adapteros-ingest-docs = { path = "../adapteros-ingest-docs", optional = true }
adapteros-api-types = { path = "../adapteros-api-types" }
# Workspace dependencies
anyhow.workspace = true
blake3.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml = "0.9"
tokio.workspace = true
once_cell.workspace = true
axum.workspace = true
tower.workspace = true
tower-http = { workspace = true, features = ["compression-br", "compression-gzip"] }
ed25519-dalek.workspace = true
# OpenAPI
utoipa = { workspace = true }
rust-embed = "8.0"
hyper.workspace = true
hyper-util.workspace = true
clap.workspace = true
# Additional dependencies
toml = "0.8"
glob = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
# OpenTelemetry distributed tracing
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
tracing-opentelemetry = { workspace = true }
mime_guess = "2.0"
uuid = { version = "1.6", features = ["v7"] }
chrono = "0.4"
sqlx = { workspace = true, default-features = false, features = ["sqlite", "runtime-tokio"] }
[target.'cfg(unix)'.dependencies]
libc = "0.2"
[dev-dependencies]
filetime = "0.2"
tempfile = "3"
