[package]
name = "adapteros-server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["telemetry"]
extended-tests = []
telemetry = ["adapteros-telemetry", "adapteros-telemetry-types", "adapteros-system-metrics"]
experimental-backends = []
mlx-ffi-backend = []

[[bin]]
name = "adapteros-server"
path = "src/main.rs"

[dependencies]
# Internal crates
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-db = { path = "../adapteros-db" }
adapteros-config = { path = "../adapteros-config" }
adapteros-server-api = { path = "../adapteros-server-api", features = ["cdp", "federation"] }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-telemetry = { path = "../adapteros-telemetry", optional = true }
adapteros-telemetry-types = { path = "../adapteros-telemetry-types", optional = true }
adapteros-system-metrics = { path = "../adapteros-system-metrics", optional = true }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-git = { path = "../adapteros-git" }
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-manifest = { path = "../adapteros-manifest" }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-orchestrator = { path = "../adapteros-orchestrator", features = ["cdp", "federation"] }
adapteros-federation = { path = "../adapteros-federation" }
anyhow = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }

# OpenAPI
utoipa = "5.4"
rust-embed = "8.0"

# Additional dependencies
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
mime_guess = "2.0"
uuid = { version = "1.6", features = ["v7"] }
chrono = "0.4"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
hex = "0.4"
reqwest = { version = "0.11", features = ["json"] }
async-trait = "0.1"
futures-util = { workspace = true }

[dev-dependencies]
tempfile = "3.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
