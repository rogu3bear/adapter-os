[package]
name = "adapteros-server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "adapteros-server"
path = "src/main.rs"

[dependencies]
# Internal crates
adapteros-core = { path = "../adapteros-core" }
adapteros-db = { path = "../adapteros-db" }
adapteros-config = { path = "../adapteros-config" }
adapteros-server-api = { path = "../adapteros-server-api" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-verify = { path = "../adapteros-verify" }
adapteros-git = { path = "../adapteros-git", optional = true }
adapteros-metrics-exporter = { path = "../adapteros-metrics-exporter" }
adapteros-orchestrator = { path = "../adapteros-orchestrator" }
anyhow = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }

# OpenAPI
utoipa = "4.2"
rust-embed = "8.0"

# Additional dependencies
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
mime_guess = "2.0"
uuid = { version = "1.6", features = ["v7"] }
chrono = "0.4"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
hex = "0.4"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
