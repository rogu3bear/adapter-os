[package]
name = "adapteros-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
redb = "3.0"
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tantivy = { workspace = true }
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
# Note: adapteros-db is NOT a dependency to avoid circular dependency
# Migration tooling that needs Db access lives in adapteros-db crate
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-types = { path = "../adapteros-types" }
tokio = { version = "1.0", features = ["fs", "time", "sync", "macros", "rt-multi-thread"] }
uuid = { version = "1.6", features = ["v4"] }
glob = "0.3"
regex = "1.0"
bytes = "1.11"
dirs = "5"
cap-std = { workspace = true }
fs2 = { workspace = true }
[dev-dependencies]
tokio = { version = "1.35", features = ["full", "macros", "rt-multi-thread"] }
tempfile = "3.25"
# No additional dependencies needed - uses std and workspace deps
