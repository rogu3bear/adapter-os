[package]
name = "adapteros-storage"
version = "0.1.0"
edition = "2021"
authors = ["AdapterOS Team"]
description = "Storage management and disk space enforcement for AdapterOS"
license = "MIT OR Apache-2.0"

[dependencies]
adapteros-core = { path = "../adapteros-core" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-telemetry = { path = "../adapteros-telemetry" }
tokio = { version = "1.0", features = ["fs", "time", "sync", "macros", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
glob = "0.3"
regex = "1.0"
tempfile = "3.8"

[dev-dependencies]
tokio-test = "0.4"
