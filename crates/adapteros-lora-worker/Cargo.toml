[package]
name = "adapteros-lora-worker"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
# multi-backend is default because training requires MLX FFI for base model forward pass
default = ["multi-backend"]
deterministic-only = []
telemetry-sysinfo = ["dep:sysinfo"]
# Backend feature flags
# These must be explicitly enabled to activate conditional compilation paths
#
# coreml-backend: Enables CoreML + Neural Engine support
#   - Adds adapteros-lora-kernel-coreml as dependency
#   - Enables ANE detection and CoreML model loading
#   - macOS 13+ required
# multi-backend: Enables MLX FFI backend
#   - Adds adapteros-lora-mlx-ffi as dependency
#   - For research/training workloads
# remote-llm: Enables remote LLM backend for external API services
#   - Adds reqwest HTTP client dependency
#   - Allows egress to remote LLM endpoints
#   - SECURITY: Only enable if egress is intentionally permitted
coreml-backend = ["dep:adapteros-lora-kernel-coreml"]
multi-backend = ["dep:adapteros-lora-mlx-ffi"]
remote-llm = ["dep:reqwest"]
# mlx-bridge: Enables MLX subprocess bridge backend (Python subprocess)
#   - Uses Python mlx-lm via subprocess for MoE models
#   - Opt-in only to avoid mandatory Python dependencies
#   - When disabled, MoE MLX models are rejected instead of falling back
mlx-bridge = ["multi-backend"]
# Alias for clarity
mlx-backend = ["multi-backend"]
mlx = ["multi-backend"]  # Enable real MLX backend (includes multi-backend for FFI)
real-mlx = ["mlx"]       # Legacy alias (deprecated)
loom = []
# base-model-training: DEPRECATED - base model is now always required
#   - This feature flag is kept for backward compatibility but has no effect
#   - Training always requires a base model for proper cross-entropy loss computation
#   - The "scaled token ID proxy" approach has been removed as it produced incorrect adapters
#   - Use multi-backend feature to enable MLX training support
base-model-training = ["multi-backend"]
# Model server mode: Workers connect to shared Model Server instead of loading model locally
#   - Reduces GPU memory usage by ~65% (one model copy instead of N)
#   - Requires adapteros-model-server running
model-server = ["dep:adapteros-model-server", "dep:tonic"]
# Residency testing features
ci-residency = []                    # Enable standard CI residency tests
hardware-residency = []             # Enable hardware residency tests (Mac Studio)
# test-utils: Enables test helper methods like MicroLoRATrainer::new_for_test()
#   - Use this in integration tests that need a trainer without a real base model
#   - Not intended for production use
test-utils = []
[dependencies]
adapteros-core = { path = "../adapteros-core", features = ["cache-attestation"] }
adapteros-id = { path = "../adapteros-id" }
adapteros-config = { path = "../adapteros-config" }
adapteros-lora-rag = { path = "../adapteros-lora-rag" }
adapteros-storage = { path = "../adapteros-storage" }
adapteros-model-hub = { path = "../adapteros-model-hub" }
adapteros-aos = { path = "../adapteros-aos" }
adapteros-retrieval = { path = "../adapteros-retrieval" }
adapteros-db = { path = "../adapteros-db" }
adapteros-policy = { path = "../adapteros-policy" }
adapteros-lora-router = { path = "../adapteros-lora-router" }
adapteros-lora-kernel-api = { path = "../adapteros-lora-kernel-api" }
adapteros-lora-kernel-coreml = { path = "../adapteros-lora-kernel-coreml", optional = true }
# Use C++ FFI for real MLX inference (primary/only supported path)
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", optional = true, features = ["mlx"] }
adapteros-telemetry = { path = "../adapteros-telemetry" }
adapteros-lora-lifecycle = { path = "../adapteros-lora-lifecycle" }
adapteros-crypto = { path = "../adapteros-crypto" }
adapteros-deterministic-exec = { path = "../adapteros-deterministic-exec" }
adapteros-memory = { path = "../adapteros-memory" }
adapteros-types = { path = "../adapteros-types" }
adapteros-api-types = { path = "../adapteros-api-types" }
adapteros-boot = { path = "../adapteros-boot" }
adapteros-model-server = { path = "../adapteros-model-server", optional = true }
lru = "0.16"
ed25519-dalek = { workspace = true }
# adapteros-lint = { path = "../adapteros-lint" }  # Temporarily disabled due to dependency issues
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_jcs = { workspace = true }
walkdir = { workspace = true }
thiserror = { workspace = true }
tokenizers = { workspace = true }
safetensors = { workspace = true }
memmap2 = { workspace = true }
once_cell = { workspace = true }
half = "2.3"
crossbeam = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
rand_chacha = "0.3"
zeroize = { version = "1.7", features = ["derive"] }
bytemuck = "1.14"
tracing = { workspace = true }
uuid = { version = "1.0", features = ["v4", "v7", "serde"] }
regex = "1.0"
tokio-util = { version = "0.7", features = ["time"] }
hkdf = "0.12"
sha2 = "0.10"
hex = { workspace = true }
base64 = { version = "0.21" }
async-trait = "0.1"
anyhow = { workspace = true }
serde_yaml = "0.9"
toml = { workspace = true }
blake3 = { workspace = true }
csv = "1.3"
unicode-normalization = "0.1"
zip = "1.1"
flate2 = "1.0"
tar = "0.4"
dirs = "5.0"
git2 = "0.20"
tempfile = { workspace = true }
sqlx = { workspace = true, default-features = false, features = ["runtime-tokio", "sqlite"] }
chrono = "0.4"
smallvec = "1.13"
sysinfo = { workspace = true, optional = true }  # Telemetry + residency harness
reqwest = { version = "0.12", features = ["json"], optional = true }
ureq = "3.2"  # PRD-09: Blocking HTTP client for panic hook
libc = "0.2"
clap = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
tonic = { version = "0.12", optional = true }
[[bin]]
name = "aos-worker"
path = "src/bin/aos_worker.rs"

[[bin]]
name = "residency_harness"
path = "src/bin/residency_harness.rs"
required-features = ["hardware-residency"]
[dev-dependencies]
loom = { version = "0.7", features = ["futures"] }
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.0"
serial_test = "3.0"
sysinfo = { workspace = true }
adapteros-lora-mlx-ffi = { path = "../adapteros-lora-mlx-ffi", features = ["mlx"] }
[[bench]]
name = "hotswap"
harness = false
[target.'cfg(target_os = "macos")'.dependencies]
adapteros-lora-kernel-mtl = { path = "../adapteros-lora-kernel-mtl" }
nix = { workspace = true }
mach = "0.3"
metal = { workspace = true }
