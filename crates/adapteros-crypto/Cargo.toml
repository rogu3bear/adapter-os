[package]
name = "adapteros-crypto"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default = []
extended-tests = []
linux-keychain = ["dep:secret-service", "dep:keyutils", "dep:nix"]
password-fallback = ["dep:argon2", "dep:chacha20poly1305"]

[dependencies]
adapteros-core = { path = "../adapteros-core" }
anyhow = { workspace = true }
async-trait = { workspace = true }
blake3 = { workspace = true }
ed25519-dalek = { workspace = true }
hkdf = { workspace = true }
sha2 = { workspace = true }
aes-gcm = { workspace = true }
rand = { workspace = true }
rand_core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
subtle = "2.5"
thiserror = { workspace = true }
tracing = { workspace = true }
zeroize = { workspace = true }
hex = "0.4"
base64 = "0.22"
security-framework = "2.11"
security-framework-sys = "2.11"

# Linux keychain dependencies (optional)
secret-service = { version = "3.0", optional = true }
keyutils = { version = "0.4", optional = true }
nix = { version = "0.27", features = ["fs", "process"], optional = true }

# Password fallback dependencies (optional)
argon2 = { version = "0.5", features = ["std"], optional = true }
chacha20poly1305 = { version = "0.10", optional = true }

# Required dependencies
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
