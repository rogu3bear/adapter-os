[package]
name = "aos-smoke"
version = "0.1.0"
edition = "2021"
description = "Smoke test runner for AdapterOS inference and receipt verification"
publish = false

# Keep out of workspace
[workspace]

[[bin]]
name = "aos-smoke"
path = "src/main.rs"

[dependencies]
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
clap = { version = "4", features = ["derive", "env"] }
colored = "2.0"
blake3 = "1.5"
