name: Multi-OS Reproducibility Suite

on:
  push:
    branches:
      - main
  schedule:
    # Nightly drift check
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  reproducibility-macos:
    name: Reproducibility Check (macOS)
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build and test
        run: |
          cargo build --release
          cargo test --workspace
      
      - name: Record baseline
        run: |
          mkdir -p artifacts
          cargo run --bin aosctl -- baseline record \
            --run-id "run-$(date +%s)" \
            --commit "${{ github.sha }}" \
            --arch "aarch64-apple-darwin" \
            --suite "reproducibility" \
            --artifacts ./target/release \
            --sign \
            --output ./baselines || echo "Baseline recording skipped"
      
      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-macos-${{ github.sha }}
          path: baselines/
          retention-days: 90

  reproducibility-linux:
    name: Reproducibility Check (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build and test
        run: |
          cargo build --release
          cargo test --workspace
      
      - name: Record baseline
        run: |
          mkdir -p artifacts
          cargo run --bin aosctl -- baseline record \
            --run-id "run-$(date +%s)" \
            --commit "${{ github.sha }}" \
            --arch "x86_64-unknown-linux-gnu" \
            --suite "reproducibility" \
            --artifacts ./target/release \
            --sign \
            --output ./baselines || echo "Baseline recording skipped"
      
      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-linux-${{ github.sha }}
          path: baselines/
          retention-days: 90

  drift-check:
    name: Nightly Drift Check
    runs-on: ubuntu-latest
    needs: [reproducibility-macos, reproducibility-linux]
    if: github.event_name == 'schedule'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download baselines
        uses: actions/download-artifact@v4
        with:
          pattern: baseline-*
          merge-multiple: true
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Compare baselines
        run: |
          # Find latest baselines
          LATEST_MACOS=$(ls -t baselines/*_aarch64-apple-darwin_*.toml 2>/dev/null | head -1)
          LATEST_LINUX=$(ls -t baselines/*_x86_64-unknown-linux-gnu_*.toml 2>/dev/null | head -1)
          
          if [ -n "$LATEST_MACOS" ] && [ -n "$LATEST_LINUX" ]; then
            cargo run --bin aosctl -- baseline delta \
              --baseline-a "$LATEST_MACOS" \
              --baseline-b "$LATEST_LINUX" \
              --output drift-report.json || echo "Drift check completed with differences"
          else
            echo "No baselines found for comparison"
          fi
      
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: drift-report.json
          retention-days: 90

