name: Architectural Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  SQLX_OFFLINE: "1"

jobs:
  architectural-lint:
    name: Architectural lint check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: architectural-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check MoE/LoRA naming conventions
        run: bash scripts/check_moe_lora_naming.sh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build lint tool
        run: cargo build -p adapteros-lint --release

      - name: Determine lint scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          base_sha="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          changed_handlers="$(git diff --name-only "$base_sha"...HEAD | grep -E '^crates/adapteros-server-api/src/handlers/.*\.rs$' || true)"

          if [[ -z "$changed_handlers" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$changed_handlers" > architectural-lint-files.txt
          echo "mode=changed" >> "$GITHUB_OUTPUT"

      - name: Run architectural lint
        id: lint
        shell: bash
        run: |
          output_file="$RUNNER_TEMP/architectural-lint-output.txt"
          : > "$output_file"
          violations=0

          case "${{ steps.scope.outputs.mode }}" in
            skip)
              printf 'No handler changes in this PR; architectural lint skipped.\n' > "$output_file"
              ;;
            changed)
              while IFS= read -r file; do
                [[ -n "$file" ]] || continue
                if ! ./target/release/adapteros-lint check "$file" >> "$output_file" 2>&1; then
                  violations=1
                fi
              done < architectural-lint-files.txt
              ;;
            *)
              if ! ./target/release/adapteros-lint check-all > "$output_file" 2>&1; then
                violations=1
              fi
              ;;
          esac

          echo "violations=$violations" >> "$GITHUB_OUTPUT"
          echo "output_file=$output_file" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          LINT_OUTPUT_FILE: ${{ steps.lint.outputs.output_file }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- adapteros-architectural-lint -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            let lintOutput = '';
            if (process.env.LINT_OUTPUT_FILE && fs.existsSync(process.env.LINT_OUTPUT_FILE)) {
              lintOutput = fs.readFileSync(process.env.LINT_OUTPUT_FILE, 'utf-8');
            }

            async function getExistingComment() {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              return comments.find((comment) => comment.body && comment.body.includes(marker));
            }

            async function clearComment() {
              const existing = await getExistingComment();
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                });
              }
            }

            async function upsertComment(body) {
              const existing = await getExistingComment();
              const payload = `${marker}\n${body}`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: payload,
                });
                return;
              }

              await github.rest.issues.createComment({
                issue_number,
                owner,
                repo,
                body: payload,
              });
            }

            if (!lintOutput || lintOutput.includes('No architectural violations') || lintOutput.includes('architectural lint skipped')) {
              await clearComment();
              return;
            }

            let body = '## 🔍 Architectural Lint Results\n\n';
            body += '❌ **Architectural violations detected:**\n\n';
            body += '```\n' + lintOutput + '\n```\n';
            body += '\n**Fix:** Review violations and follow AGENTS.md patterns.\n';
            await upsertComment(body);

      - name: Fail on violations
        if: steps.lint.outputs.violations != '0'
        run: |
          echo "::error::Architectural violations found. Fix violations before merging."
          exit 1
