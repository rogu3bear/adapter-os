name: KV Verify

on:
  push:
    branches: [main]
    paths:
      - 'crates/adapteros-db/**'
      - 'crates/adapteros-cli/**'
      - 'migrations/**'
      - 'Makefile'
      - '.github/workflows/kv-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/adapteros-db/**'
      - 'crates/adapteros-cli/**'
      - 'migrations/**'
      - 'Makefile'
      - '.github/workflows/kv-verify.yml'

jobs:
  kv-verify:
    name: Fail on KV drift/fallback/error
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: kv-verify-reg-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: kv-verify-git-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare database (apply migrations)
        run: |
          mkdir -p var
          cargo run -p adapteros-cli -- db migrate --db-path ./var/aos-cp.sqlite3

      - name: Verify SQL↔KV parity (fail on drift)
        run: |
          cargo run -p adapteros-cli -- storage verify \
            --db-path ./var/aos-cp.sqlite3 \
            --kv-path ./var/aos-kv.redb \
            --domains adapters,tenants,stacks,plans,auth_sessions,runtime_sessions,rag_artifacts \
            --fail-on-drift \
            --json

