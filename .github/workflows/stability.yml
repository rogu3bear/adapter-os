name: Stability Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  stability:
    name: Stability Check
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, miri

      - name: Prepare Miri
        run: cargo +nightly miri setup

      - name: Seed test env
        run: |
          echo "AOS_DATABASE_URL=sqlite:var/aos-cp.sqlite3" > .env

      - name: Run stability gate
        run: scripts/ci/stability.sh

  ignored-tests:
    name: Ignored Test Sweep (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SQLX_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Seed test env
        run: |
          echo "AOS_DATABASE_URL=sqlite:var/aos-cp.sqlite3" > .env

      - name: Run ignored test sweep
        run: cargo test --workspace -- --ignored --test-threads=1 2>&1 || true
