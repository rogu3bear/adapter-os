name: Stability Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  stability:
    name: Stability Check
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect stability-relevant changes
        id: relevance
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -Eq '^(Cargo\.lock|Cargo\.toml|docs/api/openapi\.json|scripts/ci/stability\.sh|scripts/ci/check_openapi_drift\.sh|scripts/ci/build_leptos_wasm\.sh|scripts/check_inference_bypass\.sh|scripts/test/|crates/adapteros-api-types/|crates/adapteros-client/|crates/adapteros-core/|crates/adapteros-lora-router/|crates/adapteros-server/|crates/adapteros-server-api/|crates/adapteros-ui/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No stability-relevant changes in pull request; skipping."
          fi

      - name: Setup Rust (nightly + miri)
        if: steps.relevance.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, miri

      - name: Prepare Miri
        if: steps.relevance.outputs.run == 'true'
        run: cargo +nightly miri setup

      - name: Seed test env
        if: steps.relevance.outputs.run == 'true'
        run: |
          echo "AOS_DATABASE_URL=sqlite:var/aos-cp.sqlite3" > .env

      - name: Run stability gate
        if: steps.relevance.outputs.run == 'true'
        run: scripts/ci/stability.sh

  ignored-tests:
    name: Ignored Test Sweep (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SQLX_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Seed test env
        run: |
          echo "AOS_DATABASE_URL=sqlite:var/aos-cp.sqlite3" > .env

      - name: Run ignored test sweep
        run: cargo test --workspace -- --ignored --test-threads=1 2>&1 || true
