name: Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'tests/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUST_LOG: debug

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run database migrations
        run: |
          cargo build -p adapteros-db --bin migrate 2>/dev/null || true
          mkdir -p var

      - name: "Run integration tests (Team 1: Backend Infrastructure)"
        run: |
          cargo test --test team_1_backend_infrastructure \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: false

      - name: "Run integration tests (Team 2: API Integration)"
        run: |
          cargo test --test team_2_api_integration \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: false

      - name: "Run integration tests (Team 3: Inference Pipeline)"
        run: |
          cargo test --test team_3_inference_pipeline \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: "Run integration tests (Team 4: Training & ML)"
        run: |
          cargo test --test team_4_training_ml \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: "Run integration tests (Team 5: Security & Compliance)"
        run: |
          cargo test --test team_5_security_compliance \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: Run common utilities tests
        run: |
          cargo test -p adapteros-server-api auth_enhanced \
            --release \
            -- --test-threads=2 --nocapture
        continue-on-error: false

  # NOTE: Coverage job moved to ci.yml (runs on main push only)
  # The integration-tests.yml path filters caused coverage to rarely run.
  # See ci.yml for the new coverage job targeting critical crates.

  lint:
    name: Linting & Formatting
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --test integration_tests -- -D warnings
        continue-on-error: true

  database-schema:
    name: Database Schema Validation
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run schema consistency tests
        run: |
          cargo test -p adapteros-db schema_consistency_tests \
            --release \
            -- --nocapture --test-threads=1

      - name: Verify migrations
        run: |
          cargo test -p adapteros-db metadata_integration_tests \
            --release \
            -- --nocapture --test-threads=1

  performance:
    name: Performance Benchmarks
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: |
          cargo bench -p adapteros-lora-mlx-ffi --bench mlx_integration_benchmark \
            --release \
            -- --nocapture
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: target/criterion/
        if: always()

  summary:
    name: Test Summary
    runs-on: macos-latest
    needs: [integration-tests, lint, database-schema]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Generate test metrics
        run: |
          mkdir -p var
          ./scripts/generate_test_metrics.sh var/test-metrics.md
        continue-on-error: true

      - name: Report Results
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Team 1: Backend Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "Team 2: API Integration" >> $GITHUB_STEP_SUMMARY
          echo "Database Schema Validation" >> $GITHUB_STEP_SUMMARY
          echo "Code Linting & Formatting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: Coverage reports are generated in ci.yml (main branch only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Append test metrics if available
          if [ -f var/test-metrics.md ]; then
            echo "## Test Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat var/test-metrics.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if critical tests failed
        run: exit 1
        if: needs.integration-tests.result == 'failure'
