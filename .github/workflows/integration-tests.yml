name: Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'tests/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUST_LOG: debug

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run database migrations
        run: |
          cargo build -p adapteros-db --bin migrate 2>/dev/null || true
          mkdir -p var

      - name: Run integration tests (Team 1: Backend Infrastructure)
        run: |
          cargo test --test team_1_backend_infrastructure \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: false

      - name: Run integration tests (Team 2: API Integration)
        run: |
          cargo test --test team_2_api_integration \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: false

      - name: Run integration tests (Team 3: Inference Pipeline)
        run: |
          cargo test --test team_3_inference_pipeline \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: Run integration tests (Team 4: Training & ML)
        run: |
          cargo test --test team_4_training_ml \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: Run integration tests (Team 5: Security & Compliance)
        run: |
          cargo test --test team_5_security_compliance \
            --release \
            --all \
            --features "production-macos,extended-tests" \
            -- --test-threads=2 --nocapture
        continue-on-error: true

      - name: Run common utilities tests
        run: |
          cargo test -p adapteros-server-api auth_enhanced \
            --release \
            -- --test-threads=2 --nocapture
        continue-on-error: false

  coverage:
    name: Code Coverage
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --test \
            --out Html \
            --out Cobertura \
            --output-dir coverage \
            --timeout 600 \
            --exclude-files tests/* \
            --ignore-panics \
            --ignore-timeouts
        continue-on-error: true

      - name: Generate coverage JSON and check thresholds
        run: |
          # Generate JSON to stdout and save to file
          cargo tarpaulin \
            --test \
            --out stdout \
            --format json \
            --timeout 600 \
            --exclude-files tests/* \
            --ignore-panics \
            --ignore-timeouts > coverage.json 2>&1 || true
          
          # Check if coverage.json was created and has content
          if [ ! -f coverage.json ] || [ ! -s coverage.json ]; then
            echo "Warning: Coverage JSON generation failed or produced empty file"
            echo "Skipping threshold check"
            exit 0
          fi
          
          # Validate JSON format
          if ! python3 -m json.tool coverage.json > /dev/null 2>&1; then
            echo "Error: Invalid JSON in coverage.json"
            cat coverage.json
            exit 1
          fi
          
          # Check coverage thresholds
          python3 scripts/check_coverage.py --report coverage.json --output coverage-report.md
        continue-on-error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            coverage/
            coverage.json
            coverage-report.md
        if: always()

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          name: adapteros-coverage
          verbose: true
        if: always() && (success() || failure())

  lint:
    name: Linting & Formatting
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --test integration_tests -- -D warnings
        continue-on-error: true

  database-schema:
    name: Database Schema Validation
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run schema consistency tests
        run: |
          cargo test -p adapteros-db schema_consistency_tests \
            --release \
            -- --nocapture --test-threads=1

      - name: Verify migrations
        run: |
          cargo test -p adapteros-db metadata_integration_tests \
            --release \
            -- --nocapture --test-threads=1

  performance:
    name: Performance Benchmarks
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: |
          cargo bench -p adapteros-lora-mlx-ffi --bench mlx_integration_benchmark \
            --release \
            -- --nocapture
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: target/criterion/
        if: always()

  summary:
    name: Test Summary
    runs-on: macos-latest
    needs: [integration-tests, coverage, lint, database-schema]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Generate test metrics
        run: |
          mkdir -p var
          ./scripts/generate_test_metrics.sh var/test-metrics.md
        continue-on-error: true

      - name: Report Results
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Team 1: Backend Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "✓ Team 2: API Integration" >> $GITHUB_STEP_SUMMARY
          echo "✓ Database Schema Validation" >> $GITHUB_STEP_SUMMARY
          echo "✓ Code Linting & Formatting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Coverage reports available in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Append test metrics if available
          if [ -f var/test-metrics.md ]; then
            echo "## Test Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat var/test-metrics.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if critical tests failed
        run: exit 1
        if: needs.integration-tests.result == 'failure'
