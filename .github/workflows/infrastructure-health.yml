name: Infrastructure Health Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 6 AM UTC to catch issues early
    - cron: '0 6 * * *'

jobs:
  infrastructure-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run Infrastructure Health Check
      run: ./scripts/prevent_infrastructure_issues.sh

    - name: Basic Compilation Test
      run: cargo check --workspace

    - name: Core Test Validation
      run: cargo test --package adapteros-core --lib --quiet
