name: Infrastructure Health Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 6 AM UTC to catch issues early
    - cron: "0 6 * * *"

jobs:
  infrastructure-check:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Detect infrastructure-relevant changes
        id: relevance
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -Eq '^(Cargo\.lock|Cargo\.toml|scripts/prevent_infrastructure_issues\.sh|crates/adapteros-boot/|crates/adapteros-core/|crates/adapteros-infra-common/|crates/adapteros-memory/|crates/adapteros-platform/|crates/adapteros-service-supervisor/|crates/adapteros-system-metrics/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No infrastructure-relevant changes in pull request; skipping."
          fi

      - name: Setup Rust
        if: steps.relevance.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        if: steps.relevance.outputs.run == 'true'
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Infrastructure Health Check
        if: steps.relevance.outputs.run == 'true'
        run: ./scripts/prevent_infrastructure_issues.sh

      - name: Basic Compilation Test
        if: steps.relevance.outputs.run == 'true'
        run: cargo check --workspace --exclude adapteros-lora-kernel-mtl --exclude adapteros-lora-mlx-ffi --exclude adapteros-lora-kernel-coreml

      - name: Core Test Validation
        if: steps.relevance.outputs.run == 'true'
        run: cargo test --package adapteros-core --lib --quiet
