name: Schema Drift Detection

on:
  pull_request:
    paths:
      - 'crates/adapteros-api-types/**'
      - 'ui/src/api/types.ts'
      - 'ui/src/api/client.ts'
      - 'crates/adapteros-server-api/**'
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  detect-merge-conflicts:
    name: Check for Merge Conflicts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Scan for conflict markers
        run: |
          if grep -r "<<<<<<< HEAD" ui/src/api/ crates/adapteros-api-types/ 2>/dev/null; then
            echo "::error::Merge conflict markers found!"
            exit 1
          fi
          echo "✓ No merge conflicts detected"

  count-types:
    name: Verify Type Counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Count TypeScript types
        id: ts_count
        run: |
          TS_COUNT=$(grep -c "^export \(interface\|type\|const\)" ui/src/api/types.ts || echo "0")
          echo "count=$TS_COUNT" >> $GITHUB_OUTPUT
          echo "TypeScript type exports: $TS_COUNT"

      - name: Count Rust API types
        id: rust_count
        run: |
          RUST_COUNT=$(find crates/adapteros-api-types/src -name "*.rs" -exec grep -h "^pub struct\|^pub enum" {} \; | wc -l)
          echo "count=$RUST_COUNT" >> $GITHUB_OUTPUT
          echo "Rust API types: $RUST_COUNT"

      - name: Check for significant drift
        run: |
          TS_COUNT=${{ steps.ts_count.outputs.count }}
          RUST_COUNT=${{ steps.rust_count.outputs.count }}

          # Warn if TypeScript has significantly fewer types than Rust
          if [ $TS_COUNT -lt $((RUST_COUNT / 2)) ]; then
            echo "::warning::TypeScript types ($TS_COUNT) significantly fewer than Rust types ($RUST_COUNT)"
            echo "Consider generating TypeScript types from OpenAPI schema"
          fi

  check-duplicate-types:
    name: Detect Duplicate Type Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for UserRole duplication
        run: |
          USER_ROLE_COUNT=$(grep -c "^export type UserRole" ui/src/api/types.ts || echo "0")
          if [ "$USER_ROLE_COUNT" -gt 1 ]; then
            echo "::error::Multiple UserRole definitions found ($USER_ROLE_COUNT)"
            grep -n "^export type UserRole" ui/src/api/types.ts
            exit 1
          fi
          echo "✓ No UserRole duplication"

      - name: Check for RouterDecision duplication
        run: |
          RUST_COUNT=$(rg "^pub struct RouterDecision" --type rust -c | awk '{sum+=$1} END {print sum}' || echo "0")
          if [ "$RUST_COUNT" -gt 1 ]; then
            echo "::warning::Multiple RouterDecision definitions in Rust ($RUST_COUNT)"
            rg "^pub struct RouterDecision" --type rust
          fi

  validate-openapi-schema:
    name: Validate OpenAPI Schema
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Check if OpenAPI generation works
        run: |
          # Try to build the server (may fail if adapteros-server-api is disabled)
          cargo build -p adapteros-server --no-default-features || {
            echo "::warning::Server build failed - OpenAPI schema generation unavailable"
            echo "This is expected if adapteros-server-api crate is disabled"
            exit 0
          }

  typescript-type-check:
    name: TypeScript Type Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Type check
        run: cd ui && npm run type-check

  rust-clippy:
    name: Rust Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: clippy

      - name: Run Clippy on API types
        run: |
          cargo clippy -p adapteros-api-types -- -D warnings

  schema-version-check:
    name: Schema Version Tracking
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check if API types changed
        id: api_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "crates/adapteros-api-types/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "API types were modified"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Remind about schema versioning
        if: steps.api_changes.outputs.changed == 'true'
        run: |
          echo "::warning::API types changed - consider updating schema version"
          echo "Remember to:"
          echo "  1. Update version in docs/api/openapi.json"
          echo "  2. Regenerate TypeScript types if needed"
          echo "  3. Document breaking changes in CHANGELOG.md"

  generate-drift-report:
    name: Generate Drift Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3

      - name: Generate type comparison
        run: |
          echo "# Schema Drift Report" > /tmp/drift-report.md
          echo "" >> /tmp/drift-report.md
          echo "## Type Counts" >> /tmp/drift-report.md

          TS_COUNT=$(grep -c "^export \(interface\|type\|const\)" ui/src/api/types.ts || echo "0")
          RUST_COUNT=$(find crates/adapteros-api-types/src -name "*.rs" -exec grep -h "^pub struct\|^pub enum" {} \; | wc -l)

          echo "- TypeScript exports: $TS_COUNT" >> /tmp/drift-report.md
          echo "- Rust API types: $RUST_COUNT" >> /tmp/drift-report.md
          echo "" >> /tmp/drift-report.md

          echo "## Files Changed in This PR" >> /tmp/drift-report.md
          git diff --name-only origin/main...HEAD | grep -E "(api-types|ui/src/api)" || echo "None" >> /tmp/drift-report.md

          cat /tmp/drift-report.md

      - name: Comment on PR (if available)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/drift-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
