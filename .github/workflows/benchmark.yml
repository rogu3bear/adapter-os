name: Performance Benchmarks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline commit/branch/tag for comparison'
        required: false
        default: 'main'
      fail_on_regression:
        description: 'Fail CI on performance regressions'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: macos-latest # Metal kernels require macOS
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch full history for baseline comparison

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache target directory
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-target-

    - name: Install system dependencies
      run: |
        # Install Metal development tools if needed
        # Note: macOS runners already have Metal framework available

        # Install jq for JSON processing
        brew install jq

    - name: Get baseline results
      id: baseline
      run: |
        # Get baseline commit
        BASELINE_REF="${{ github.event.inputs.baseline_ref || 'main' }}"
        echo "Using baseline: $BASELINE_REF"

        # Fetch baseline branch/tag
        git fetch origin $BASELINE_REF

        # Checkout baseline and run benchmarks to get baseline results
        git checkout $BASELINE_REF
        mkdir -p baseline_results

        # Run baseline benchmarks (quick run for CI)
        ./scripts/run_benchmarks.sh --results-dir=baseline_results --no-html

        # Store baseline results
        cp baseline_results/benchmark_report.json baseline_report.json

        # Go back to current commit
        git checkout ${{ github.sha }}

        echo "baseline_file=baseline_report.json" >> $GITHUB_OUTPUT

    - name: Run current benchmarks
      run: |
        # Run current benchmarks
        ./scripts/run_benchmarks.sh \
          --baseline=${{ steps.baseline.outputs.baseline_file }} \
          --results-dir=current_results

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results-${{ github.sha }}
        path: |
          current_results/
          baseline_report.json
        retention-days: 30

    - name: Generate benchmark comparison
      run: |
        # Generate comparison report
        cargo run --manifest-path=tests/benchmark/Cargo.toml --release --bin adapteros-benchmarks -- \
          compare current_results/benchmark_report.json baseline_report.json --format html

        # Upload comparison report
        if [[ -f benchmark_comparison.html ]]; then
          cp benchmark_comparison.html current_results/
        fi

    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');

          // Read benchmark results
          let results = {};
          try {
            const resultsContent = fs.readFileSync('current_results/benchmark_report.json', 'utf8');
            results = JSON.parse(resultsContent);
          } catch (error) {
            console.log('Could not read benchmark results:', error.message);
            return;
          }

          // Generate comment
          let comment = '## 🚀 Performance Benchmark Results\n\n';

          comment += `**Timestamp:** ${new Date(results.timestamp).toISOString()}\n`;
          comment += `**System:** ${results.system_info.os} | ${results.system_info.cpu}\n`;
          comment += `**Total Benchmarks:** ${results.summary.total_benchmarks}\n`;
          comment += `**Total Time:** ${results.summary.total_time_seconds.toFixed(2)}s\n\n`;

          if (results.summary.regressions.length > 0) {
            comment += '### 🚨 Performance Regressions\n';
            results.summary.regressions.slice(0, 10).forEach(regression => {
              comment += `• ${regression}\n`;
            });
            if (results.summary.regressions.length > 10) {
              comment += `• ... and ${results.summary.regressions.length - 10} more\n`;
            }
            comment += '\n';
          }

          if (results.summary.improvements.length > 0) {
            comment += '### ✅ Performance Improvements\n';
            results.summary.improvements.slice(0, 10).forEach(improvement => {
              comment += `• ${improvement}\n`;
            });
            if (results.summary.improvements.length > 10) {
              comment += `• ... and ${results.summary.improvements.length - 10} more\n`;
            }
            comment += '\n';
          }

          comment += '[📊 View detailed results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

          // Post comment
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Fail on performance regression
      if: ${{ github.event.inputs.fail_on_regression == true || github.event_name != 'workflow_dispatch' }}
      run: |
        # Check for regressions in the results
        REGRESSIONS=$(jq '.summary.regressions | length' current_results/benchmark_report.json)

        if [[ "$REGRESSIONS" -gt 0 ]]; then
          echo "🚨 Performance regressions detected: $REGRESSIONS"
          jq -r '.summary.regressions[]' current_results/benchmark_report.json
          exit 1
        else
          echo "✅ No performance regressions detected"
        fi

  benchmark-nightly:
    name: Nightly Performance Regression Check
    runs-on: macos-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-nightly-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: brew install jq

    - name: Run comprehensive benchmarks
      run: |
        # Run full benchmark suite
        ./scripts/run_benchmarks.sh \
          --results-dir=nightly_results \
          --baseline=nightly_baseline.json

    - name: Store baseline for next run
      run: |
        # Store current results as baseline for next nightly run
        cp nightly_results/benchmark_report.json nightly_baseline.json

        # Upload baseline
        echo "Storing baseline for next nightly run..."
        # In a real setup, you'd upload this to artifact storage

    - name: Send nightly report
      run: |
        # Send notification with results summary
        # This could integrate with Slack, Discord, etc.
        echo "Nightly benchmark run completed"

  benchmark-on-demand:
    name: On-Demand Benchmark Run
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-ondemand-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: brew install jq

    - name: Run benchmarks
      run: |
        # Run benchmarks with custom configuration
        ./scripts/run_benchmarks.sh \
          --results-dir=ondemand_results \
          --no-fail-on-regression

    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: ondemand-benchmark-results
        path: ondemand_results/
        retention-days: 7