name: Mirror to Organization
on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      - name: Mirror to MLnavigatoInc/adapterOS
        run: |
          git remote add upstream https://github.com/MLnavigatoInc/adapterOS.git
          
          # Push current branch
          git push upstream HEAD:main
          
          # Push tags if this is a tag push
          if [[ "${{ github.event_name }}" == "push" && -n "${{ github.ref_name }}" && "${{ github.ref_name }}" == v* ]]; then
            git push upstream --tags
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
