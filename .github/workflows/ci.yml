name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check format
        run: cargo fmt --all -- --check

  env-path-policy:
    name: PRD-13 Path Policy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check env path policy
        run: ./scripts/check_env_paths.sh

  anchor-contract:
    name: ANCHOR Contract Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ANCHOR contract guard
        run: ./scripts/ci/check_anchor_contract.sh

  feature-matrix:
    name: Feature Matrix Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run feature matrix checks
        run: cargo xtask check-all --verbose

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --exclude adapteros-lora-mlx-ffi -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Guard legacy AOS flag in CI
        run: |
          case "${AOS_ALLOW_LEGACY_AOS:-0}" in
            1|true|TRUE|yes|YES)
              echo "::error::AOS_ALLOW_LEGACY_AOS must remain disabled in CI tests"
              exit 1
              ;;
            *)
              echo "Legacy AOS flag is not enabled (expected)"
              ;;
          esac
      - name: Run tests
        run: cargo test --workspace --all-targets --exclude adapteros-lora-mlx-ffi

  extended-tenant-isolation-tests:
    name: Extended Tenant Isolation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Guard legacy AOS flag in CI
        run: |
          case "${AOS_ALLOW_LEGACY_AOS:-0}" in
            1|true|TRUE|yes|YES)
              echo "::error::AOS_ALLOW_LEGACY_AOS must remain disabled in CI tests"
              exit 1
              ;;
            *)
              echo "Legacy AOS flag is not enabled (expected)"
              ;;
          esac
      - name: Run extended tenant isolation tests
        run: cargo test --test integration --features extended-tests tenant_isolation -- --nocapture

  test-macos:
    name: Test Suite (macOS, full workspace)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Guard legacy AOS flag in CI
        run: |
          case "${AOS_ALLOW_LEGACY_AOS:-0}" in
            1|true|TRUE|yes|YES)
              echo "::error::AOS_ALLOW_LEGACY_AOS must remain disabled in CI tests"
              exit 1
              ;;
            *)
              echo "Legacy AOS flag is not enabled (expected)"
              ;;
          esac
      - name: Run tests
        run: cargo test --workspace --all-targets

  test-macos-production:
    name: Test Suite (macOS, production-macos)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Guard legacy AOS flag in CI
        run: |
          case "${AOS_ALLOW_LEGACY_AOS:-0}" in
            1|true|TRUE|yes|YES)
              echo "::error::AOS_ALLOW_LEGACY_AOS must remain disabled in CI tests"
              exit 1
              ;;
            *)
              echo "Legacy AOS flag is not enabled (expected)"
              ;;
          esac
      - name: Run tests with production-macos features
        run: |
          cargo test --workspace --all-targets \
            --features production-macos \
            --exclude adapteros-lora-mlx-ffi

  hardware-residency:
    name: Hardware Residency Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run hardware residency tests
        run: |
          cargo test --workspace \
            --features hardware-residency \
            -- --ignored --nocapture

  kv-primary:
    name: KV Primary Mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare KV path
        run: mkdir -p /tmp/aos-kv
      - name: Guard legacy AOS flag in CI
        run: |
          case "${AOS_ALLOW_LEGACY_AOS:-0}" in
            1|true|TRUE|yes|YES)
              echo "::error::AOS_ALLOW_LEGACY_AOS must remain disabled in CI tests"
              exit 1
              ;;
            *)
              echo "Legacy AOS flag is not enabled (expected)"
              ;;
          esac
      - name: Detect KV-only coverage readiness
        id: coverage
        run: |
          python - <<'PY'
          import os, re, pathlib

          content = pathlib.Path("crates/adapteros-db/src/lib.rs").read_text()
          match = re.search(r"const UNSUPPORTED: &[^\[]*\[(.*?)\];", content, re.S)
          entries = []
          if match:
              for line in match.group(1).splitlines():
                  line = line.strip().strip(",")
                  if not line or line in ('""', "''"):
                      continue
                  entries.append(line.strip().strip('"'))

          ready = len(entries) == 0
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"coverage_ready={'true' if ready else 'false'}\n")
              fh.write(f"unsupported_domains={','.join(entries)}\n")

          if ready:
              print("KV-only coverage ready; enabling kv_only smoke")
          else:
              print(f"KV-only coverage incomplete; unsupported domains: {entries}")
          PY
      - name: Run KV-primary smoke suite
        env:
          AOS_STORAGE_BACKEND: kv_primary
          AOS_KV_PATH: /tmp/aos-kv/aos-kv.redb
        run: |
          cargo test -p adapteros-db -- --nocapture
          cargo test -p adapteros-server-api -- --nocapture
      - name: Run KV-only smoke (gated)
        if: steps.coverage.outputs.coverage_ready == 'true'
        env:
          AOS_STORAGE_BACKEND: kv_only
          AOS_KV_PATH: /tmp/aos-kv/aos-kv.redb
        run: cargo test -p adapteros-db --test kv_only_paths -- --nocapture
      - name: Skip KV-only smoke (coverage incomplete)
        if: steps.coverage.outputs.coverage_ready != 'true'
        run: 'echo "KV-only smoke skipped; unsupported domains: ${{ steps.coverage.outputs.unsupported_domains }}"'

  kv-verify:
    name: KV Drift Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run SQL↔KV verify gate
        env:
          KV_VERIFY_DB: /tmp/aos-ci.sqlite3
          KV_VERIFY_KV: /tmp/aos-kv.redb
          KV_VERIFY_OUT: kv-verify.json
        run: |
          set -euo pipefail
          make kv-verify KV_VERIFY_DB=$KV_VERIFY_DB KV_VERIFY_KV=$KV_VERIFY_KV KV_VERIFY_OUT=$KV_VERIFY_OUT
          cat kv-verify.json
          jq -e '(.drift == 0) and (.fallback == 0) and (.errors == 0) and (.degraded == false)' kv-verify.json

  # ==========================================================================
  # Gold Standard E2E Test (runs on every PR)
  # ==========================================================================
  gold-standard-e2e:
    name: Gold Standard E2E Test
    runs-on: macos-14
    timeout-minutes: 5
    env:
      AOS_DEV_NO_AUTH: "1"
      AOS_BACKEND: mock
      AOS_DETERMINISM_SEED: "2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a"
      RUST_BACKTRACE: "1"
      RUST_LOG: "adapteros=debug,tower_http=warn"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run gold standard E2E test
        run: cargo test --test gold_standard_e2e -- --test-threads=2 --nocapture
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gold-standard-e2e-failures
          path: target/test-failures/

  # ==========================================================================
  # Happy Path Smoke Test (runs on every PR)
  # ==========================================================================
  happy-path-smoke:
    name: Happy Path Smoke Test
    runs-on: macos-14
    timeout-minutes: 5
    env:
      AOS_DEV_NO_AUTH: "1"
      AOS_BACKEND: mock
      RUST_BACKTRACE: "1"
      RUST_LOG: "warn"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.2 --no-default-features --features sqlite --locked
      - name: Run happy path smoke test
        run: ./scripts/test/smoke_happy_path.sh --verbose
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: happy-path-smoke-logs
          path: var/smoke-happy-path/

  # ==========================================================================
  # Streaming Reliability Tests (runs on every PR)
  # ==========================================================================
  streaming-reliability:
    name: Streaming Reliability Tests
    runs-on: macos-14
    timeout-minutes: 10
    env:
      AOS_DEV_NO_AUTH: "1"
      RUST_BACKTRACE: "1"
      RUST_LOG: "adapteros=debug,tower_http=warn"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run streaming reliability tests
        run: cargo test -p adapteros-server-api --test streaming_reliability -- --test-threads=2 --nocapture
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: streaming-reliability-failures
          path: target/test-failures/

  # ==========================================================================
  # Determinism Replay Harness (runs on all PRs and main pushes)
  # ==========================================================================
  replay-harness:
    name: Determinism Replay Harness
    runs-on: macos-14
    timeout-minutes: 20
    # Run on PRs and main pushes to catch replay regressions before merge
    env:
      AOS_DEV_NO_AUTH: "1"
      AOS_BACKEND: mock
      AOS_DETERMINISM_SEED: "2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a2a"
      RUST_BACKTRACE: "1"
      RUST_LOG: "adapteros=debug"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run replay harness (serial execution)
        run: cargo test --test determinism_replay_harness -- --test-threads=1 --nocapture
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-harness-failures
          path: target/test-failures/
      - name: Upload golden fixtures
        uses: actions/upload-artifact@v4
        with:
          name: golden-fixtures
          path: tests/fixtures/golden/

  # ==========================================================================
  # Determinism Suite
  # ==========================================================================
  determinism:
    name: Determinism Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AOS_DEV_NO_AUTH: "1"
      AOS_BACKEND: mock
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Determinism smoke fixtures
        run: cargo test --test determinism_smoke -- --nocapture
      - name: Run determinism check
        run: make determinism-check
      - name: Run determinism hardening tests
        run: cargo test --test determinism_hardening_tests -- --nocapture
      - name: Scan build for -ffast-math flags
        run: |
          set -euo pipefail
          if [ ! -d target ]; then
            cargo check --locked --all-features
          fi
          if rg "-ffast-math" target; then
            echo "::error::-ffast-math detected in build outputs"
            exit 1
          fi
          echo "No -ffast-math flags detected in build artifacts"

  prod-gate:
    name: Prod Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run prod gate
        run: cargo test -p adapteros-e2e --features prod-gate
      - name: Upload prod gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-gate-report
          path: target/prod-gate/report.json

  mlx-impl-matrix:
    name: MLX Impl Matrix (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-mlx
            os: ubuntu-latest
            features: ""
          - name: mlx-ffi
            os: ubuntu-latest
            features: "mlx"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run MLX selection tests
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test -p adapteros-lora-mlx-ffi --features "${{ matrix.features }}"
          else
            cargo test -p adapteros-lora-mlx-ffi
          fi

  macos-mlx-ffi:
    name: MLX FFI (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install MLX dependencies
        run: |
          brew install mlx
      - name: Build MLX FFI
        run: |
          cargo build -p adapteros-lora-mlx-ffi --features mlx
      - name: Test MLX FFI
        run: |
          cargo test -p adapteros-lora-mlx-ffi --features mlx -- --nocapture

  worker-gate:
    name: Worker Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run worker gate
        run: cargo test -p adapteros-e2e --features worker-gate --test worker_gate
      - name: Upload worker gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-gate-report
          path: target/worker-gate/report.json

  sqlx-offline:
    name: SQLx Offline Cache Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.2 --no-default-features --features sqlite --locked
      - name: Prepare SQLite path
        run: mkdir -p var
      - name: Run migrations (SQLite)
        env:
          DATABASE_URL: sqlite://./var/sqlx-ci.sqlite3
        run: cargo sqlx migrate run
      - name: Verify committed SQLx cache
        env:
          DATABASE_URL: sqlite://./var/sqlx-ci.sqlite3
          SQLX_OFFLINE_DIR: crates/adapteros-db/.sqlx
        run: cargo sqlx prepare --workspace --check
      - name: Verify offline build (all SQLx crates)
        env:
          SQLX_OFFLINE: "1"
          SQLX_OFFLINE_DIR: crates/adapteros-db/.sqlx
        run: |
          # Verify all crates with sqlx::query! macros compile offline
          cargo check -p adapteros-db
          cargo check -p adapteros-server-api
          cargo check -p adapteros-server

  cli-models-seed:
    name: CLI Models Seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build CLI
        run: cargo build -p adapteros-cli
      - name: Setup test environment
        run: |
          mkdir -p var/test-model
          # Create a minimal mock model for testing (config.json required)
          echo '{"model_type":"llama","hidden_size":256}' > var/test-model/config.json
          echo '{}' > var/test-model/tokenizer.json
          echo '{}' > var/test-model/tokenizer_config.json
      - name: Run migrations
        run: |
          DATABASE_URL="sqlite://./var/test-cli.sqlite3" \
            AOS_SKIP_MIGRATION_SIGNATURES=1 \
            cargo sqlx migrate run
      - name: Test models seed command
        run: |
          DATABASE_URL="sqlite://./var/test-cli.sqlite3" \
            ./target/debug/aosctl models seed --model-path var/test-model
      - name: Test models list command
        run: |
          DATABASE_URL="sqlite://./var/test-cli.sqlite3" \
            ./target/debug/aosctl models list
      - name: Verify model was seeded
        run: |
          DATABASE_URL="sqlite://./var/test-cli.sqlite3" \
            ./target/debug/aosctl models list --json | jq -e '.count >= 1'

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit --ignore RUSTSEC-2021-0139
      - name: Generate SBOM
        run: |
          # Install cargo-sbom if available, or use basic dependency listing
          cargo tree > sbom.txt || echo "cargo tree fallback used"
          echo "Software Bill of Materials generated" >> sbom.txt
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.txt

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-license
        run: cargo install cargo-license
      - name: Check licenses
        run: |
          cargo license --json > licenses.json
          # Check for unacceptable licenses
          if jq -r '.[] | select(.license | test("^(GPL|LGPL|CDDL|CECILL|MPL)")) | .name' licenses.json | grep -q .; then
            echo "::error::Unacceptable license found in dependencies"
            jq -r '.[] | select(.license | test("^(GPL|LGPL|CDDL|CECILL|MPL)")) | "\(.name): \(.license)"' licenses.json
            exit 1
          else
            echo "✅ All dependency licenses are acceptable"
          fi
      - name: Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: licenses.json

  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release --workspace --exclude adapteros-lora-mlx-ffi
      - name: Install b3sum for provenance hashing
        run: cargo install b3sum --locked
      - name: Generate signed SBOM and provenance bundle
        if: github.event_name != 'pull_request'
        env:
          RELEASE_SIGNING_KEY_PEM: ${{ secrets.RELEASE_SIGNING_KEY_PEM }}
          RELEASE_SIGNING_PUBKEY_HEX: ${{ secrets.RELEASE_SIGNING_PUBKEY_HEX }}
        run: bash scripts/release/sbom.sh
      - name: Upload release provenance bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: target/release-bundle

  openapi-spec-drift:
    name: OpenAPI Spec Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check OpenAPI spec drift (utoipa version + spec content)
        run: ./scripts/ci/check_openapi_drift.sh
      - name: Verify OpenAPI spec quality
        run: |
          if ! jq -e '.paths | length > 0' docs/api/openapi.json > /dev/null; then
            echo "::error::OpenAPI spec has no paths defined"
            exit 1
          fi
          if ! jq -e '.components.schemas | length > 0' docs/api/openapi.json > /dev/null; then
            echo "::error::OpenAPI spec has no schemas defined"
            exit 1
          fi
          echo "✓ OpenAPI spec structure is valid"
          echo "  Paths: $(jq '.paths | length' docs/api/openapi.json)"
          echo "  Schemas: $(jq '.components.schemas | length' docs/api/openapi.json)"

  route-map-freshness:
    name: Route Map Freshness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate route map and check for drift
        run: |
          ./scripts/dev/generate_route_map.sh

          if git diff --exit-code docs/api/ROUTE_MAP.md; then
            echo "✓ Route map is up to date"
          else
            echo "::error::Route map is out of date!"
            echo ""
            echo "The route map has drifted from the source."
            echo "Please regenerate and commit:"
            echo ""
            echo "  ./scripts/dev/generate_route_map.sh"
            echo "  git add docs/api/ROUTE_MAP.md"
            echo "  git commit -m 'docs: regenerate route map'"
            echo ""
            git diff docs/api/ROUTE_MAP.md
            exit 1
          fi

  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Seed corpora
        run: |
          mkdir -p fuzz/corpus/router_inputs fuzz/corpus/trace_encoding fuzz/corpus/receipt_verification
          cp -r crates/adapteros-lora-router/fuzz/corpus/router_inputs/. fuzz/corpus/router_inputs/ || true
          cp -r crates/adapteros-lora-router/fuzz/corpus/trace_encoding/. fuzz/corpus/trace_encoding/ || true
          cp -r crates/adapteros-lora-router/fuzz/corpus/receipt_verification/. fuzz/corpus/receipt_verification/ || true
      - name: Run router_inputs fuzz (60s cap)
        run: cargo fuzz run router_inputs -- -max_total_time=60
      - name: Run trace_encoding fuzz (60s cap)
        run: cargo fuzz run trace_encoding -- -max_total_time=60
      - name: Run receipt_verification fuzz (60s cap)
        run: cargo fuzz run receipt_verification -- -max_total_time=60

  leptos-wasm-build:
    name: Leptos WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install trunk
        run: cargo install trunk --locked
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get update && sudo apt-get install -y binaryen brotli
      - name: Build UI (shared script)
        run: ./scripts/build-ui.sh
      - name: Measure and gate sizes
        run: |
          set -euo pipefail
          WASM_FILE=$(ls crates/adapteros-server/static/adapteros-ui-*.wasm | head -1)
          AFTER_SIZE=$(stat -c%s "$WASM_FILE")
          echo "WASM size: $AFTER_SIZE bytes"

          # PRD-UI-170: Assert WASM size < 3.5MB (target: 2.5MB, gate: 3.5MB)
          MAX_SIZE=$((3500000))
          if [ "$AFTER_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::WASM size ($AFTER_SIZE bytes) exceeds PRD-UI-170 gate (3.5MB)"
            exit 1
          fi
          echo "✓ WASM size within PRD-UI-170 limits"

          # PRD-UI-BOUNDARY: Assert brotli size < 1.2MB for network transfer budget
          # Brotli is the primary compression format for modern browsers
          sudo apt-get install -y brotli >/dev/null 2>&1 || true
          brotli -9 -c "$WASM_FILE" > "${WASM_FILE}.br"
          BROTLI_SIZE=$(stat -c%s "${WASM_FILE}.br")
          echo "Brotli size: $BROTLI_SIZE bytes"

          MAX_BROTLI=$((1200000))
          if [ "$BROTLI_SIZE" -gt "$MAX_BROTLI" ]; then
            echo "::error::Brotli WASM ($BROTLI_SIZE bytes) exceeds transfer budget (1.2MB)"
            exit 1
          fi
          echo "✓ Brotli WASM within transfer budget"

          # Stretch goal tracking (1.0 MB) - warning only, no fail
          STRETCH_GOAL=$((1000000))
          if [ "$BROTLI_SIZE" -gt "$STRETCH_GOAL" ]; then
            echo "::warning::Brotli WASM ($BROTLI_SIZE bytes) exceeds stretch goal (1.0MB)"
          fi

          # Keep gzip for fallback comparison
          GZIP_SIZE=$(gzip -9 -c "$WASM_FILE" | wc -c | tr -d ' ')
          echo "Gzip size: $GZIP_SIZE bytes (fallback)"

          # Record bundle sizes for trending (GitHub Actions Job Summary)
          DIST_DIR="crates/adapteros-server/static"
          JS_FILE=$(find "$DIST_DIR" -name "*.js" -type f | head -1)
          JS_SIZE=$(stat -c%s "$JS_FILE" 2>/dev/null || echo "0")

          echo "## Bundle Size Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| WASM (raw) | $(numfmt --to=iec $AFTER_SIZE) |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM (brotli) | $(numfmt --to=iec $BROTLI_SIZE) |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM (gzip) | $(numfmt --to=iec $GZIP_SIZE) |" >> $GITHUB_STEP_SUMMARY
          echo "| JS glue | $(numfmt --to=iec $JS_SIZE) |" >> $GITHUB_STEP_SUMMARY
      - name: Verify WASM artifacts exist
        run: |
          if [ ! -f crates/adapteros-server/static/index.html ]; then
            echo "::error::index.html not found in static output"
            exit 1
          fi
          if ! ls crates/adapteros-server/static/adapteros-ui-*.wasm 2>/dev/null; then
            echo "::error::WASM file not found in static output"
            exit 1
          fi
          echo "✓ Leptos WASM build artifacts verified"
          ls -la crates/adapteros-server/static/
      - name: PRD-UI-000 Asset integrity check
        run: ./scripts/ci/check_ui_assets.sh
      - name: Upload UI artifacts for TTI test
        uses: actions/upload-artifact@v4
        with:
          name: leptos-wasm-build
          path: crates/adapteros-server/static/
          retention-days: 1

  # ==========================================================================
  # TTI Measurement (PRD-UI-170)
  # ==========================================================================
  tti-measurement:
    name: TTI Measurement (PRD-UI-170)
    runs-on: ubuntu-latest
    needs: leptos-wasm-build
    timeout-minutes: 10
    env:
      AOS_DEV_NO_AUTH: "1"
      AOS_BACKEND: mock
      AOS_SERVER_PORT: "8080"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.2 --no-default-features --features sqlite --locked
      - name: Download UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: leptos-wasm-build
          path: crates/adapteros-server/static/
      - name: Build server
        run: cargo build -p adapteros-server --release
      - name: Setup test database
        run: |
          mkdir -p var
          touch var/tti-test.sqlite3
          SQLX_DISABLE_STATEMENT_CHECKS=1 \
          AOS_SKIP_MIGRATION_SIGNATURES=1 \
          DATABASE_URL="sqlite://./var/tti-test.sqlite3" \
            cargo sqlx migrate run
      - name: Start server
        run: |
          AOS_SKIP_MIGRATION_SIGNATURES=1 \
          SQLX_DISABLE_STATEMENT_CHECKS=1 \
          DATABASE_URL="sqlite://./var/tti-test.sqlite3" \
          AOS_DATABASE_URL="sqlite://./var/tti-test.sqlite3" \
          RUST_LOG=warn \
            ./target/release/adapteros-server \
              --config configs/cp.toml &
          SERVER_PID=$!
          echo $SERVER_PID > var/server.pid

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -fsS --max-time 2 http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Verify server is up
          curl -fsS http://127.0.0.1:8080/healthz || (echo "Server failed to start"; exit 1)
      - name: Measure TTI with Lighthouse
        run: |
          npx lighthouse http://127.0.0.1:8080 \
            --only-categories=performance \
            --output=json \
            --output-path=./lighthouse.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu"

          TTI=$(jq '.audits["interactive"].numericValue' lighthouse.json)
          echo "TTI: ${TTI}ms"

          # PRD-UI-170: Dashboard interactive in <2s
          if (( $(echo "$TTI > 2000" | bc -l) )); then
            echo "::error::TTI (${TTI}ms) exceeds 2s target (PRD-UI-170)"

            # Show performance breakdown for debugging
            echo ""
            echo "=== Performance Breakdown ==="
            jq -r '.audits | to_entries[] | select(.value.numericValue != null) | "\(.key): \(.value.numericValue)ms"' lighthouse.json | head -20

            exit 1
          fi

          echo "::notice::TTI ${TTI}ms is within 2s target"

          # Record to job summary
          echo "## TTI Measurement (PRD-UI-170)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Time to Interactive | ${TTI}ms | <2000ms |" >> $GITHUB_STEP_SUMMARY
      - name: Stop server
        if: always()
        run: |
          if [ -f var/server.pid ]; then
            kill $(cat var/server.pid) 2>/dev/null || true
          fi
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse.json

  leptos-wasm-check:
    name: Leptos WASM Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Check WASM compilation
        run: cargo check -p adapteros-ui --target wasm32-unknown-unknown
      - name: Verify WASM closure (no server-only crates)
        run: |
          # PRD-UI-BOUNDARY: Forbidden crates in WASM closure
          # These crates are server-only and must NOT be compiled into the browser bundle
          FORBIDDEN_CRATES="blake3 schemars sqlx rusqlite ring tokio reqwest"
          FAILED=0

          for crate in $FORBIDDEN_CRATES; do
            if cargo tree -p adapteros-ui --target wasm32-unknown-unknown -i "$crate" 2>/dev/null | grep -q "$crate"; then
              echo "::error::Forbidden crate '$crate' found in WASM dependency closure"
              cargo tree -p adapteros-ui --target wasm32-unknown-unknown -i "$crate" 2>/dev/null | head -10
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::WASM boundary violation detected. Server-only crates must not leak into browser bundle."
            echo "Fix: Ensure feature gates in adapteros-types/adapteros-api-types exclude server dependencies for WASM."
            exit 1
          fi

          echo "✓ WASM closure is clean (no server-only crates)"

  leptos-api-types-contract:
    name: Leptos API Types Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Verify adapteros-api-types WASM compatibility
        run: cargo check -p adapteros-api-types --target wasm32-unknown-unknown
      - name: Verify types are used consistently
        run: |
          # Check that UI uses the shared api-types crate
          if ! grep -q 'adapteros-api-types' crates/adapteros-ui/Cargo.toml; then
            echo "::error::adapteros-ui must depend on adapteros-api-types for type consistency"
            exit 1
          fi
          echo "✓ Leptos UI uses shared API types"
      - name: Check for type mismatches
        run: |
          # Build both server-api and ui to ensure types align
          cargo check -p adapteros-server-api
          cargo check -p adapteros-ui --target wasm32-unknown-unknown
          echo "✓ Server and UI types compile successfully"
