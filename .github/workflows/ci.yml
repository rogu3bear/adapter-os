          # Store ABI map for comparison
          echo "ABI map generated for MLX FFI"
          cat abi-map-current.txt | head -20
      
      - name: Check ABI stability
        run: |
          # Compare with previous ABI map if available
          if [ -f "abi-map-previous.txt" ]; then
            if ! diff abi-map-previous.txt abi-map-current.txt; then
              echo "❌ ABI BREAKING CHANGE DETECTED"
