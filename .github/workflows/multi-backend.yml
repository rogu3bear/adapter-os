name: Multi-Backend Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # Linux builds - no Metal, no CoreML
  linux-build:
    name: Linux Build (No Metal/CoreML)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "deterministic-only"
          - "full"
          - "no-metal"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.features }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with features
        run: |
          cargo build --workspace \
            --exclude adapteros-lora-kernel-mtl \
            --exclude adapteros-lora-mlx-ffi \
            --features "${{ matrix.features }}"

      - name: Test with features
        run: |
          cargo test --workspace \
            --exclude adapteros-lora-kernel-mtl \
            --exclude adapteros-lora-mlx-ffi \
            --features "${{ matrix.features }}"

  # macOS builds - Metal backend
  macos-metal:
    name: macOS Metal Backend
    runs-on: macos-14  # macOS Sonoma with Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-metal-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Metal device access
        run: |
          chmod +x scripts/verify_metal_access.sh
          scripts/verify_metal_access.sh || (echo "Metal verification failed - skipping GPU tests" && exit 0)

      - name: Check Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Build Metal backend only
        run: |
          cargo build -p adapteros-lora-kernel-mtl \
            --features metal-backend

      - name: Test Metal backend
        run: |
          cargo test -p adapteros-lora-kernel-mtl \
            --features metal-backend

      - name: Verify Metal shader compilation
        run: |
          ls -lh crates/adapteros-lora-kernel-mtl/shaders/
          cat crates/adapteros-lora-kernel-mtl/shaders/kernel_hash.txt

  # macOS builds - CoreML backend
  macos-coreml:
    name: macOS CoreML Backend
    runs-on: macos-14  # Requires macOS 13+ for Neural Engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-coreml-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Metal device access
        run: |
          chmod +x scripts/verify_metal_access.sh
          scripts/verify_metal_access.sh || (echo "Metal verification failed - skipping GPU tests" && exit 0)

      - name: Check CoreML availability
        run: |
          system_profiler SPSoftwareDataType

      - name: Build CoreML backend only
        run: |
          cargo build -p adapteros-lora-kernel-coreml \
            --features ane-optimizations

      - name: Test CoreML backend
        run: |
          cargo test -p adapteros-lora-kernel-coreml \
            --features ane-optimizations \
            -- --nocapture

      - name: CoreML perf smoke (tok/s ≥40, p95 <30ms)
        run: |
          CONFIG_PATH="var/model-cache/models/qwen2.5-7b-instruct-bf16/config.json"
          # seq_len 512
          MODEL_PATH_512="var/model-cache/models/qwen2.5-7b-instruct-fp16-512.mlpackage"
          OUTPUT=$(AOS_COREML_MLMODEL="$MODEL_PATH_512" \
            AOS_COREML_CONFIG="$CONFIG_PATH" \
            COREML_BENCH_STEPS=8 \
            COREML_BENCH_WARMUP=2 \
            COREML_BENCH_SEQ_LEN=512 \
            COREML_BENCH_SOFTMAX=1 \
            cargo run -p adapteros-lora-kernel-coreml \
              --example coreml_perf \
              --release \
              --features ane-optimizations)
          echo "$OUTPUT"
          METRICS=$(echo "$OUTPUT" | tail -n 1)
          python3 - <<'PY' "$METRICS"
          import json, sys
          line = sys.argv[1]
          data = json.loads(line)
          tokps = float(data["tokens_per_sec"])
          p95 = float(data.get("p95_ms_per_token", data.get("p95_ms", 0.0)))
          if tokps < 40.0:
              raise SystemExit(f"tokens_per_sec {tokps:.2f} below required 40 tok/s")
          if p95 > 30.0:
              raise SystemExit(f"p95_ms_per_token {p95:.2f} exceeds 30ms target")
          print(f"CoreML perf OK: {tokps:.2f} tok/s, p95/token {p95:.2f} ms")

# seq_len 4096 (per-token p95 gating)
MODEL_PATH_4096="var/model-cache/models/qwen2.5-7b-instruct-fp16-4096.mlpackage"
OUTPUT_4096=$(AOS_COREML_MLMODEL="$MODEL_PATH_4096" \
  AOS_COREML_CONFIG="$CONFIG_PATH" \
  COREML_BENCH_STEPS=4 \
  COREML_BENCH_WARMUP=1 \
  COREML_BENCH_SEQ_LEN=4096 \
  COREML_BENCH_SOFTMAX=0 \
  cargo run -p adapteros-lora-kernel-coreml \
    --example coreml_perf \
    --release \
    --features ane-optimizations)
echo "$OUTPUT_4096"
METRICS_4096=$(echo "$OUTPUT_4096" | tail -n 1)
python3 - <<'PY' "$METRICS_4096"
import json, sys
line = sys.argv[1]
data = json.loads(line)
tokps = float(data["tokens_per_sec"])
p95 = float(data.get("p95_ms_per_token", data.get("p95_ms", 0.0)))
if tokps < 40.0:
    raise SystemExit(f"tokens_per_sec {tokps:.2f} below required 40 tok/s (seq_len=4096)")
if p95 > 30.0:
    raise SystemExit(f"p95_ms_per_token {p95:.2f} exceeds 30ms target (seq_len=4096)")
print(f"CoreML perf OK (4096): {tokps:.2f} tok/s, p95/token {p95:.2f} ms")
          PY

  # macOS builds - All backends
  macos-all-backends:
    name: macOS All Backends
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-all-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Metal device access
        run: |
          chmod +x scripts/verify_metal_access.sh
          scripts/verify_metal_access.sh || (echo "Metal verification failed - skipping GPU tests" && exit 0)

      - name: Build all backends
        run: |
          cargo build -p adapteros-lora-kernel-mtl \
            --features all-backends

      - name: Test all backends
        run: |
          cargo test -p adapteros-lora-kernel-mtl \
            --features all-backends \
            -- --nocapture

      - name: Build workspace with all backends
        run: |
          cargo build --workspace \
            --exclude adapteros-lora-mlx-ffi \
            --features all-backends

  # Feature matrix validation
  feature-matrix:
    name: Feature Matrix Validation
    runs-on: macos-14
    strategy:
      matrix:
        feature_combo:
          - ""  # Default features
          - "metal-backend"
          - "coreml-backend"
          - "all-backends"
          - "deterministic-only"
          - "full,metal-backend"
          - "full,all-backends"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build with feature combination
        run: |
          if [ -z "${{ matrix.feature_combo }}" ]; then
            cargo build -p adapteros-lora-kernel-mtl
          else
            cargo build -p adapteros-lora-kernel-mtl \
              --features "${{ matrix.feature_combo }}"
          fi

      - name: Check for feature conflicts
        run: |
          cargo tree -p adapteros-lora-kernel-mtl \
            --features "${{ matrix.feature_combo }}" \
            -e features

  # Clippy with all backends
  clippy-backends:
    name: Clippy Multi-Backend
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy Metal backend
        run: |
          cargo clippy -p adapteros-lora-kernel-mtl \
            --features metal-backend \
            -- -D warnings

      - name: Clippy CoreML backend
        run: |
          cargo clippy -p adapteros-lora-kernel-mtl \
            --features coreml-backend \
            -- -D warnings

      - name: Clippy all backends
        run: |
          cargo clippy -p adapteros-lora-kernel-mtl \
            --features all-backends \
            -- -D warnings
