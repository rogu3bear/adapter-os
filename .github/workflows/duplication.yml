name: Duplication Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the job if any duplication is found"
        required: false
        default: "false"

jobs:
  jscpd:
    name: jscpd duplication check
    runs-on: ubuntu-latest
    env:
      # Strict mode: fail if any clones are present (ignores baseline).
      # Defaults to baseline-ratchet mode unless overridden.
      ENFORCE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.enforce) || vars.JSCPD_ENFORCE || 'false' }}
      JSCPD_BASELINE: configs/jscpd.baseline.json
    permissions:
      contents: read
      pull-requests: write
      issues: write
    concurrency:
      group: duplication-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run jscpd scan
        shell: bash
        run: |
          bash scripts/run_jscpd.sh --ci

      - name: Locate latest report
        id: locate
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d "var/reports/jscpd" ]]; then
            echo "::error::Missing var/reports/jscpd. Did the scan step run?"
            exit 1
          fi

          latest_path="$(ls -1dt var/reports/jscpd/*/ | head -n1)"
          latest_dir="$(basename "$latest_path")"
          base="var/reports/jscpd/$latest_dir"

          # Modern jscpd (v4+) filenames
          json="$base/jscpd-report.json"
          md="$base/jscpd-report.md"
          html="$base/html/index.html"

          # Back-compat for older wrappers/configs
          [[ -f "$json" ]] || json="$base/report.json"
          [[ -f "$md" ]] || md="$base/report.md"
          [[ -f "$html" ]] || html="$base/index.html"

          echo "dir=$latest_dir" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "md=$md" >> "$GITHUB_OUTPUT"
          echo "json=$json" >> "$GITHUB_OUTPUT"
          echo "html=$html" >> "$GITHUB_OUTPUT"

      - name: Upload jscpd reports
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-reports
          path: var/reports/jscpd/${{ steps.locate.outputs.dir }}
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- adapteros-duplication-scan -->';
            const mdPath = '${{ steps.locate.outputs.md }}';
            const jsonPath = '${{ steps.locate.outputs.json }}';
            const baselinePath = process.env.JSCPD_BASELINE || 'configs/jscpd.baseline.json';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            async function getExistingComment() {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              return comments.find((comment) => comment.body && comment.body.includes(marker));
            }

            async function clearComment() {
              const existing = await getExistingComment();
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                });
              }
            }

            async function upsertComment(body) {
              const existing = await getExistingComment();
              const payload = `${marker}\n${body}`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: payload,
                });
                return;
              }

              await github.rest.issues.createComment({
                issue_number,
                owner,
                repo,
                body: payload,
              });
            }

            let shouldComment = false;
            let body = '## 🔍 Duplication Scan Results\n\n';

            if (fs.existsSync(jsonPath)) {
              const report = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const total = (report.statistics && report.statistics.total) || {};
              const clones = Number(total.clones || 0);
              const duplicatedLines = Number(total.duplicatedLines || 0);
              const percentage = Number(total.percentage || 0);
              const sources = Number(total.sources || 0);
              const regressions = [];

              body += `- **Clones:** ${clones.toLocaleString()}\n`;
              body += `- **Duplicated lines:** ${duplicatedLines.toLocaleString()}\n`;
              body += `- **Duplication:** ${percentage}%\n`;
              body += `- **Sources scanned:** ${sources.toLocaleString()}\n\n`;

              if (fs.existsSync(baselinePath)) {
                try {
                  const baseline = JSON.parse(fs.readFileSync(baselinePath, 'utf8'));
                  const bTotal = (baseline.statistics && baseline.statistics.total) || baseline || {};
                  const bClones = Number(bTotal.clones || 0);
                  const bDupLines = Number(bTotal.duplicatedLines || 0);
                  body += 'Baseline (`' + baselinePath + '`): clones=' + bClones.toLocaleString() + ', duplicatedLines=' + bDupLines.toLocaleString() + '\n\n';
                  if (clones > bClones) {
                    regressions.push(`clones ${clones.toLocaleString()} > baseline ${bClones.toLocaleString()}`);
                  }
                  if (duplicatedLines > bDupLines) {
                    regressions.push(`duplicated lines ${duplicatedLines.toLocaleString()} > baseline ${bDupLines.toLocaleString()}`);
                  }
                } catch (_) {
                  body += 'Baseline (`' + baselinePath + '`): unreadable\n\n';
                  shouldComment = true;
                }
              } else {
                body += 'Baseline (`' + baselinePath + '`): missing\n\n';
                shouldComment = true;
              }

              if (regressions.length > 0) {
                shouldComment = true;
                body += `**Regression:** ${regressions.join(', ')}\n\n`;
              }

              if (fs.existsSync(mdPath)) {
                const md = fs.readFileSync(mdPath, 'utf8');
                body += '<details><summary>View Details</summary>\n\n' + md + '\n</details>';
              }
            } else {
              shouldComment = true;
              body += '⚠️ Report not found';
            }

            if (!shouldComment) {
              await clearComment();
              return;
            }

            await upsertComment(body);

      - name: Enforce baseline / strict mode
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          json="${{ steps.locate.outputs.json }}"
          baseline="${JSCPD_BASELINE}"

          if [[ -z "${json}" || ! -f "${json}" ]]; then
            echo "::warning::jscpd report not found"
            exit 0
          fi
          if [[ ! -f "${baseline}" ]]; then
            echo "::error::Missing baseline file: ${baseline}"
            exit 1
          fi

          node - <<'NODE' "$json" "$baseline" "${ENFORCE}"
          const fs = require('fs');

          const reportPath = process.argv[2];
          const baselinePath = process.argv[3];
          const enforce = String(process.argv[4] || '').toLowerCase() === 'true';

          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const total = report.statistics?.total || {};

          const current = {
            clones: Number(total.clones || 0),
            duplicatedLines: Number(total.duplicatedLines || 0),
            percentage: Number(total.percentage || 0),
            sources: Number(total.sources || 0),
          };

          const baselineRaw = JSON.parse(fs.readFileSync(baselinePath, 'utf8'));
          const bTotal = baselineRaw.statistics?.total || baselineRaw || {};
          const baseline = {
            clones: Number(bTotal.clones || 0),
            duplicatedLines: Number(bTotal.duplicatedLines || 0),
          };

          const fmt = (n) => (Number.isFinite(n) ? n.toLocaleString() : String(n));
          console.log(`jscpd current: clones=${fmt(current.clones)} duplicatedLines=${fmt(current.duplicatedLines)} (${current.percentage}%) sources=${fmt(current.sources)}`);
          console.log(`jscpd baseline (${baselinePath}): clones=${fmt(baseline.clones)} duplicatedLines=${fmt(baseline.duplicatedLines)}`);

          if (enforce && current.clones > 0) {
            console.log(`::error::Strict ENFORCE=true: duplication found (${current.clones} clones)`);
            process.exit(1);
          }

          const regressions = [];
          if (current.clones > baseline.clones) {
            regressions.push(`clones ${current.clones} > baseline ${baseline.clones}`);
          }
          if (current.duplicatedLines > baseline.duplicatedLines) {
            regressions.push(`duplicatedLines ${current.duplicatedLines} > baseline ${baseline.duplicatedLines}`);
          }

          if (regressions.length) {
            console.log(`::error::Duplication regression vs baseline: ${regressions.join(', ')}`);
            process.exit(1);
          }
          NODE
