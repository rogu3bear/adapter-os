name: Duplication Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the job if any duplication is found"
        required: false
        default: "false"

jobs:
  jscpd:
    name: jscpd duplication check
    runs-on: ubuntu-latest
    env:
      ENFORCE: ${{ vars.JSCPD_ENFORCE || 'false' }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    concurrency:
      group: duplication-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run jscpd scan
        shell: bash
        run: |
          bash scripts/run_jscpd.sh --ci

      - name: Locate latest report
        id: locate
        shell: bash
        run: |
          latest_dir=$(ls -1t var/reports/jscpd | head -n1)
          echo "dir=$latest_dir" >> $GITHUB_OUTPUT
          echo "md=var/reports/jscpd/$latest_dir/report.md" >> $GITHUB_OUTPUT
          echo "json=var/reports/jscpd/$latest_dir/report.json" >> $GITHUB_OUTPUT

      - name: Upload jscpd reports
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-${{ steps.locate.outputs.dir }}
          path: |
            var/reports/jscpd/${{ steps.locate.outputs.dir }}

      - name: Comment PR with duplication summary
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = core.getInput('md') || process.env.MD_PATH;
            const jsonPath = core.getInput('json') || process.env.JSON_PATH;
            const md = fs.existsSync(mdPath) ? fs.readFileSync(mdPath, 'utf8') : 'jscpd report not found.';
            /** Try to read duplicates summary for a short header */
            let header = 'jscpd duplication report';
            try { 
              const r = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const stat = r.statistics || {};
              const dup = (stat.duplicated && stat.duplicated.percentage) || (stat.duplication && stat.duplication.percentage) || 0;
              const clones = (r.clones && r.clones.length) || 0;
              header = `Duplication: ${dup}% | Clones: ${clones}`;
            } catch {}
            const body = `### ${header}\n\n${md}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
        env:
          MD_PATH: ${{ steps.locate.outputs.md }}
          JSON_PATH: ${{ steps.locate.outputs.json }}

      - name: Enforce (optional)
        if: ${{ inputs.enforce == 'true' || env.ENFORCE == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'enforce-dup')) }}
        shell: bash
        run: |
          json="${{ steps.locate.outputs.json }}"
          node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const clones = (j.clones && j.clones.length) || 0;
            if (clones > 0) {
              console.error(`Found ${clones} duplicate code blocks (clones). Failing as enforce=true.`);
              process.exit(1);
            }
          ' "$json"
