name: UI Quality Checks

on:
  push:
    paths:
      - 'ui/**'
  pull_request:
    paths:
      - 'ui/**'

jobs:
  quality:
    name: UI Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: ui
        run: pnpm tsc --noEmit

      - name: ESLint check
        working-directory: ui
        run: pnpm eslint src --max-warnings 50

      - name: Count 'as any' casts
        working-directory: ui
        run: |
          count=$(grep -r "as any" src --include="*.ts" --include="*.tsx" | wc -l | tr -d ' ')
          echo "Current 'as any' count: $count"
          if [ "$count" -gt 100 ]; then
            echo "::warning::as any count ($count) exceeds threshold (100)"
          fi
          if [ "$count" -gt 150 ]; then
            echo "::error::as any count ($count) exceeds hard limit (150)"
            exit 1
          fi

      - name: Check component sizes
        working-directory: ui
        run: |
          echo "Components over 500 lines:"
          find src/components -name "*.tsx" -exec wc -l {} \; | \
            awk '$1 > 500 { print $0 }' | \
            sort -rn | head -20

          large_count=$(find src/components -name "*.tsx" -exec wc -l {} \; | \
            awk '$1 > 1000 { count++ } END { print count+0 }')

          if [ "$large_count" -gt 0 ]; then
            echo "::warning::Found $large_count components over 1000 lines"
          fi

          if [ "$large_count" -gt 3 ]; then
            echo "::error::Too many large components ($large_count > 3)"
            exit 1
          fi

      - name: Check for console.log statements
        working-directory: ui
        run: |
          count=$(grep -r "console\.log" src --include="*.ts" --include="*.tsx" | \
            grep -v "// console.log" | \
            grep -v "test" | wc -l | tr -d ' ')

          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count console.log statements in production code"
            grep -rn "console\.log" src --include="*.ts" --include="*.tsx" | \
              grep -v "// console.log" | \
              grep -v "test" | head -10
          fi
