name: Stress Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday 2 AM UTC
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  stress:
    name: Stress Tests
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binaries
        run: |
          cargo build --release
        continue-on-error: false

      - name: Run stress tests
        run: |
          mkdir -p var
          
          # Run stress tests if they exist, otherwise skip gracefully
          if cargo test --test stress_tests --release -- --list 2>/dev/null | grep -q "test "; then
            cargo test --test stress_tests --release -- --nocapture --test-threads=1 2>&1 | tee var/stress-test-output.txt
            ./scripts/collect_stress_results.sh var/stress-test-output.txt var/stress-test-results.json
          else
            echo "No stress_tests.rs found. Creating placeholder result."
            echo '{"status": "skipped", "reason": "stress_tests.rs not found", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > var/stress-test-results.json
          fi
        continue-on-error: true

      - name: Upload stress test results
        uses: actions/upload-artifact@v3
        with:
          name: stress-test-results
          path: |
            var/stress-test-results.json
            var/stress-test-output.txt
        if: always()

      - name: Report stress test status
        run: |
          if [ -f var/stress-test-results.json ]; then
            echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat var/stress-test-results.json | python3 -m json.tool >> $GITHUB_STEP_SUMMARY || cat var/stress-test-results.json >> $GITHUB_STEP_SUMMARY
          fi

