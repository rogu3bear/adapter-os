name: macOS Metal Parity

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test-metal-parity:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run Metal parity tests
        env:
          MACOSX_DEPLOYMENT_TARGET: '13.0'
        run: |
          cargo test -p adapteros-lora-kernel-mtl --tests -- --nocapture
