name: Metal Kernel Build

on:
  push:
    branches: [main, develop]
    paths:
      - "metal/**/*.metal"
      - "crates/adapteros-lora-kernel-mtl/**"
      - ".github/workflows/metal-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "metal/**/*.metal"
      - "crates/adapteros-lora-kernel-mtl/**"

env:
  SQLX_OFFLINE: "1"

jobs:
  build:
    name: Build Metal Kernels
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Install Metal Toolchain
        run: |
          ./scripts/install-metal-toolchain.sh

      - name: Verify Metal compiler
        run: |
          xcrun --find metal
          xcrun --show-sdk-version

      - name: Build Metal kernels
        run: |
          cargo build -p adapteros-lora-kernel-mtl --release

      - name: Verify metallib files
        run: |
          ls -lh crates/adapteros-lora-kernel-mtl/shaders/
          test -f crates/adapteros-lora-kernel-mtl/shaders/adapteros_kernels.metallib
          test -f crates/adapteros-lora-kernel-mtl/shaders/aos_kernels.metallib
          test -f crates/adapteros-lora-kernel-mtl/shaders/mplora_kernels.metallib
          test -f crates/adapteros-lora-kernel-mtl/shaders/kernel_hash.txt

      - name: Verify signed manifest
        run: |
          test -f crates/adapteros-lora-kernel-mtl/manifests/metallib_manifest.json
          test -f crates/adapteros-lora-kernel-mtl/manifests/metallib_manifest.json.sig
          cat crates/adapteros-lora-kernel-mtl/manifests/metallib_manifest.json

      - name: Check kernel hash
        run: |
          cat crates/adapteros-lora-kernel-mtl/shaders/kernel_hash.txt

      - name: Upload metallib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metal-kernels
          path: |
            crates/adapteros-lora-kernel-mtl/shaders/*.metallib
            crates/adapteros-lora-kernel-mtl/shaders/kernel_hash.txt
            crates/adapteros-lora-kernel-mtl/manifests/metallib_manifest.json
            crates/adapteros-lora-kernel-mtl/manifests/metallib_manifest.json.sig
          retention-days: 30

  test:
    name: Test Metal Kernels
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Metal Toolchain
        run: |
          ./scripts/install-metal-toolchain.sh

      - name: Run Metal kernel tests
        run: |
          cargo test -p adapteros-lora-kernel-mtl --release

      - name: Run Metal kernel benchmarks (optional)
        continue-on-error: true
        run: |
          cargo bench -p adapteros-lora-kernel-mtl --no-fail-fast
