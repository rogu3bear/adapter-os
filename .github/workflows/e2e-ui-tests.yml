name: E2E UI Tests

on:
  pull_request:
    paths:
      - 'ui/**'
      - 'crates/adapteros-server-api/**'
      - '.github/workflows/e2e-ui-tests.yml'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  cypress:
    name: Cypress E2E Tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install UI dependencies
        run: |
          cd ui
          pnpm install
      
      - name: Start UI dev server
        run: |
          cd ui
          pnpm dev --host --port 3200 > /tmp/aos-ui.log 2>&1 &
          echo $! > /tmp/aos-ui.pid
          for i in {1..40}; do
            if curl -f http://localhost:3200 > /dev/null 2>&1; then
              echo "UI is ready"
              break
            fi
            if [ $i -eq 40 ]; then
              echo "UI failed to start"
              cat /tmp/aos-ui.log || true
              exit 1
            fi
            sleep 1
          done

      - name: Run Cypress tests
        run: |
          cd ui
          # Set environment variables for Cypress
          export CYPRESS_BASE_URL=http://localhost:3200
          export CYPRESS_API_BASE_URL=http://localhost:8080
          export CYPRESS_AUTH_TOKEN=dev-token
          pnpm cypress run --config-file e2e/cypress.config.ts --spec "e2e/cypress/e2e/ui/backend-selection.cy.ts,e2e/cypress/e2e/ui/training-lineage-trust.cy.ts"
        continue-on-error: false
        env:
          CYPRESS_BASE_URL: http://localhost:3200
          CYPRESS_API_BASE_URL: http://localhost:8080
          CYPRESS_AUTH_TOKEN: dev-token

      - name: Upload screenshots (on failure)
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-screenshots
          path: ui/e2e/cypress/screenshots
          retention-days: 7

      - name: Upload videos (on failure)
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-videos
          path: ui/e2e/cypress/videos
          retention-days: 7
      
      - name: Stop UI dev server
        if: always()
        run: |
          if [ -f /tmp/aos-ui.pid ]; then
            kill $(cat /tmp/aos-ui.pid) || true
          fi

