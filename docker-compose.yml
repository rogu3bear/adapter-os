version: '3.8'

services:
  # Main AdapterOS application
  adapteros:
    build:
      context: .
      target: runtime
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')}
    ports:
      - "8080:8080"    # HTTP API
      - "8443:8443"    # HTTPS API (if configured)
    environment:
      - RUST_LOG=info,adapteros=debug
      - ADAPTEROS_DATABASE_URL=file:/app/var/adapteros.db
      - ADAPTEROS_SERVER_HOST=0.0.0.0
      - ADAPTEROS_SERVER_PORT=8080
      - ADAPTEROS_METRICS_ENABLED=true
    volumes:
      - adapteros_data:/app/var
      - adapteros_logs:/app/logs
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # PostgreSQL database (optional alternative to SQLite)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=adapteros
      - POSTGRES_USER=adapteros
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-adapteros_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adapteros"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - postgres

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - cache

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

  # Development service with hot reload
  development:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - RUST_LOG=debug
      - ADAPTEROS_DATABASE_URL=file:/app/var/adapteros.db
      - ADAPTEROS_SERVER_HOST=0.0.0.0
      - ADAPTEROS_SERVER_PORT=8080
      - ADAPTEROS_DEV_MODE=true
    volumes:
      - .:/app
      - adapteros_data:/app/var
      - adapteros_logs:/app/logs
    command: ["cargo", "watch", "-x", "run --bin adapteros-server"]
    profiles:
      - dev

  # Migration service for database initialization
  migration:
    build:
      context: .
      target: migration
    environment:
      - ADAPTEROS_DATABASE_URL=file:/app/var/adapteros.db
    volumes:
      - adapteros_data:/app/var
    depends_on:
      postgres:
        condition: service_healthy
        profiles: ["postgres"]
    profiles:
      - migration

volumes:
  adapteros_data:
    driver: local
  adapteros_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: adapteros_network

