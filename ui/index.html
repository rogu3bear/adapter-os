<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AdapterOS Control Plane - Directory-aware AI inference runtime with zero network egress, deterministic execution, and multi-tenant isolation for specialized AI workloads." />
  <title>AdapterOS</title>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML += '<div style="color:red;z-index:9999;position:relative;background:white;padding:10px;border:1px solid red;">Global Error: ' + msg + '</div>';
      console.error("Global Error:", msg, error);
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="color:red;z-index:9999;position:relative;background:white;padding:10px;border:1px solid red;">Unhandled Rejection: ' + event.reason + '</div>';
      console.error("Unhandled Rejection:", event.reason);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
